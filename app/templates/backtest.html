{% extends "base.html" %}

{% block content %}
<div class="card">
    <h2>💰 回测系统</h2>

    <div class="form-group">
        <label for="stock-code">股票代码：</label>
        <select id="stock-code">
            <option value="">加载中...</option>
        </select>
    </div>

    <div class="form-group">
        <label for="days">回测天数：</label>
        <input type="number" id="days" value="100" min="50" max="300">
    </div>

    <div class="form-group">
        <label for="capital">初始资金：</label>
        <input type="number" id="capital" value="100000" min="10000" step="10000">
    </div>

    <button class="btn btn-success" onclick="runBacktest()" id="backtest-btn">运行回测</button>
</div>

<div id="backtest-result"></div>

<div id="backtest-chart" class="card" style="display: none;">
    <h2>📈 收益曲线</h2>
    <div class="chart-container">
        <canvas id="backtestChart"></canvas>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
// 加载股票列表
async function loadStockList() {
    try {
        const response = await fetch('/api/stocks');
        const data = await response.json();

        if (data.success) {
            const select = document.getElementById('stock-code');
            select.innerHTML = '<option value="">选择股票...</option>';

            // 添加股票选项
            data.data.forEach(stock => {
                const option = document.createElement('option');
                option.value = stock.code;
                option.textContent = `${stock.code} - ${stock.name}`;
                select.appendChild(option);
            });

            console.log(`已加载 ${data.total} 只股票`);
        } else {
            console.error('加载股票列表失败:', data.message);
            document.getElementById('stock-code').innerHTML = '<option value="">加载失败</option>';
        }
    } catch (error) {
        console.error('加载股票列表失败:', error);
        document.getElementById('stock-code').innerHTML = '<option value="">加载失败</option>';
    }
}

// 页面加载时
document.addEventListener('DOMContentLoaded', function() {
    // 加载股票列表
    loadStockList();
});

// 运行回测
async function runBacktest() {
    const stockCode = document.getElementById('stock-code').value;
    const days = document.getElementById('days').value;
    const capital = document.getElementById('capital').value;
    const btn = document.getElementById('backtest-btn');

    if (!stockCode) {
        alert('请选择股票代码');
        return;
    }

    // 显示加载状态
    btn.disabled = true;
    btn.textContent = '回测中...';
    showLoading('backtest-result');
    document.getElementById('backtest-chart').style.display = 'none';

    try {
        // 调用回测API
        const response = await apiRequest(`/api/backtest/${stockCode}`, {
            method: 'POST',
            body: JSON.stringify({
                days: parseInt(days),
                initial_capital: parseInt(capital)
            })
        });

        if (response.success) {
            const data = response.data;

            // 显示结果
            const resultHtml = `
                <div class="card">
                    <h2>📊 回测结果</h2>
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="label">初始资金</div>
                            <div class="value" style="font-size: 22px;">¥${data.initial_capital.toLocaleString()}</div>
                        </div>
                        <div class="stat-card ${data.final_capital >= data.initial_capital ? 'positive' : 'negative'}">
                            <div class="label">最终资金</div>
                            <div class="value" style="font-size: 22px;">¥${data.final_capital.toLocaleString()}</div>
                        </div>
                        <div class="stat-card ${data.total_return >= 0 ? 'positive' : 'negative'}">
                            <div class="label">总收益率</div>
                            <div class="value">${formatPercent(data.total_return)}</div>
                        </div>
                        <div class="stat-card">
                            <div class="label">胜率</div>
                            <div class="value">${formatPercent(data.win_rate)}</div>
                        </div>
                        <div class="stat-card ${data.max_drawdown >= 0 ? 'positive' : 'negative'}">
                            <div class="label">最大回撤</div>
                            <div class="value">${formatPercent(data.max_drawdown)}</div>
                        </div>
                        <div class="stat-card">
                            <div class="label">交易次数</div>
                            <div class="value">${data.total_trades}</div>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <h2>📋 交易记录</h2>
                    <div style="max-height: 300px; overflow-y: auto;">
                        <table class="table">
                            <thead>
                                <tr>
                                    <th>日期</th>
                                    <th>操作</th>
                                    <th>价格</th>
                                    <th>数量</th>
                                    <th>金额</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${data.trades.map(trade => `
                                    <tr>
                                        <td>${trade.date}</td>
                                        <td style="color: ${trade.action === 'buy' ? '#28a745' : '#dc3545'};">
                                            ${trade.action === 'buy' ? '买入' : '卖出'}
                                        </td>
                                        <td>${formatNumber(trade.price)}</td>
                                        <td>${trade.shares}</td>
                                        <td>¥${formatNumber(trade.amount, 0)}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;

            document.getElementById('backtest-result').innerHTML = resultHtml;

            // 显示图表
            document.getElementById('backtest-chart').style.display = 'block';
            createBacktestChart('backtestChart', data);

        } else {
            showError('backtest-result', response.message);
        }

    } catch (error) {
        showError('backtest-result', error.message);
    } finally {
        btn.disabled = false;
        btn.textContent = '运行回测';
    }
}
</script>
{% endblock %}
