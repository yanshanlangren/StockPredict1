{% extends "base.html" %}

{% block content %}
<!-- 新闻查询 -->
<div class="card">
    <h2>📰 新闻中心</h2>
    
    <!-- 搜索区域 -->
    <div style="margin-bottom: 20px;">
        <div style="display: flex; gap: 15px; align-items: flex-end; flex-wrap: wrap;">
            <div style="flex: 1; min-width: 150px;">
                <label style="display: block; margin-bottom: 5px; font-weight: 500;">股票代码（可选）</label>
                <input type="text" id="stock-code" placeholder="如: 600519" 
                       style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px;">
            </div>
            <div style="width: 150px;">
                <label style="display: block; margin-bottom: 5px; font-weight: 500;">新闻源</label>
                <select id="news-source" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px;">
                    <option value="all">加载新闻源中...</option>
                </select>
            </div>
            <div style="width: 120px;">
                <label style="display: block; margin-bottom: 5px; font-weight: 500;">新闻数量</label>
                <input type="number" id="news-limit" value="30" min="10" max="100"
                       style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px;">
            </div>
            <div style="width: 140px;">
                <label style="display: block; margin-bottom: 5px; font-weight: 500;">时效(小时)</label>
                <input type="number" id="news-max-age-hours" value="72" min="1" max="2160"
                       style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px;">
            </div>
            <button onclick="loadNews()" 
                    style="padding: 10px 25px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer;">
                🔍 查询
            </button>
        </div>
    </div>
</div>

<!-- 新闻源管理 -->
<div class="card" style="margin-top: 20px;">
    <h3>🧭 新闻源管理</h3>
    <div id="news-source-manage-message" style="display: none; margin-bottom: 10px; padding: 10px 12px; border-radius: 6px;"></div>
    <div style="margin-bottom: 12px; padding: 10px; border: 1px dashed #cbd5e1; border-radius: 8px; background: #f8fafc;">
        <div style="font-size: 13px; color: #475569; margin-bottom: 8px;">自动分析页面结构并生成 `html_selector` 配置</div>
        <div style="display: flex; gap: 8px; flex-wrap: wrap; align-items: center;">
            <input type="text" id="source-analyze-url" placeholder="输入新闻列表页URL，如 https://economy.caijing.com.cn/"
                   style="flex: 1; min-width: 320px; padding: 8px 10px; border: 1px solid #cbd5e1; border-radius: 4px;">
            <button id="source-analyze-btn" onclick="analyzeNewsSourceUrl()"
                    style="padding: 8px 14px; border: none; border-radius: 4px; background: #2563eb; color: white; cursor: pointer;">
                自动分析并填充
            </button>
        </div>
        <div id="source-analyze-result" style="margin-top: 8px; font-size: 13px; color: #475569;"></div>
    </div>

    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px;">
        <div>
            <label style="display: block; margin-bottom: 5px; font-weight: 500;">来源标识 source_id（可选）</label>
            <input type="text" id="source-id-input" placeholder="如: eastmoney_ext"
                   style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px;">
        </div>
        <div>
            <label style="display: block; margin-bottom: 5px; font-weight: 500;">显示名称</label>
            <input type="text" id="source-name-input" placeholder="如: 东方财富扩展源"
                   style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px;">
        </div>
        <div>
            <label style="display: block; margin-bottom: 5px; font-weight: 500;">抓取适配器</label>
            <select id="source-adapter-select" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px;"></select>
        </div>
        <div>
            <label style="display: block; margin-bottom: 5px; font-weight: 500;">检索关键词</label>
            <input type="text" id="source-keyword-input" placeholder="如: 财经新闻"
                   style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px;">
        </div>
        <div>
            <label style="display: block; margin-bottom: 5px; font-weight: 500;">排序优先级</label>
            <input type="number" id="source-sort-order-input" value="100" min="-10000" max="10000"
                   style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px;">
        </div>
        <div>
            <label style="display: block; margin-bottom: 5px; font-weight: 500;">描述（可选）</label>
            <input type="text" id="source-description-input" placeholder="该来源用途说明"
                   style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px;">
        </div>
        <div style="grid-column: 1 / -1;">
            <label style="display: block; margin-bottom: 5px; font-weight: 500;">适配器配置 adapter_config（JSON）</label>
            <textarea id="source-adapter-config-input" rows="8"
                      placeholder='例如: {"url":"https://example.com/feed.xml","item_selector":"article"}'
                      style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace;"></textarea>
            <div style="margin-top: 6px; display: flex; gap: 8px; flex-wrap: wrap;">
                <button type="button" onclick="applyAdapterTemplate(true)"
                        style="padding: 4px 10px; border: 1px solid #cbd5e1; border-radius: 4px; background: #f8fafc; cursor: pointer;">
                    填充当前适配器模板
                </button>
                <button type="button" onclick="formatAdapterConfigInput()"
                        style="padding: 4px 10px; border: 1px solid #cbd5e1; border-radius: 4px; background: #f8fafc; cursor: pointer;">
                    格式化JSON
                </button>
            </div>
        </div>
    </div>

    <div style="margin-top: 12px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap;">
        <label style="display: flex; align-items: center; gap: 6px;">
            <input type="checkbox" id="source-enabled-checkbox" checked>
            <span>启用该新闻源</span>
        </label>
        <span id="source-form-mode" style="font-size: 13px; color: #64748b;">当前模式：新增</span>
    </div>

    <div style="margin-top: 12px; display: flex; gap: 10px; flex-wrap: wrap;">
        <button id="news-source-save-btn" onclick="submitNewsSourceForm()"
                style="padding: 9px 20px; border: none; border-radius: 4px; background: #0f766e; color: white; cursor: pointer;">
            保存新闻源
        </button>
        <button onclick="resetNewsSourceForm()"
                style="padding: 9px 20px; border: 1px solid #cbd5e1; border-radius: 4px; background: #f8fafc; color: #334155; cursor: pointer;">
            重置
        </button>
        <button onclick="loadNewsSources(true)"
                style="padding: 9px 20px; border: 1px solid #cbd5e1; border-radius: 4px; background: white; color: #334155; cursor: pointer;">
            刷新列表
        </button>
    </div>

    <div style="margin-top: 16px;">
        <h4 style="margin: 0 0 8px 0;">已配置新闻源</h4>
        <div id="news-source-list" style="border: 1px solid #e2e8f0; border-radius: 8px; overflow: hidden;">
            <div style="padding: 12px; color: #64748b;">加载中...</div>
        </div>
    </div>
</div>

<!-- 新闻影响分析（当有股票代码时显示） -->
<div id="impact-section" class="card" style="display: none; margin-top: 20px;">
    <h3>📊 新闻影响分析</h3>
    <div id="impact-content"></div>
</div>

<!-- 新闻日特征查询 -->
<div class="card" style="margin-top: 20px;">
    <h3>🧩 新闻日级特征查询</h3>
    <div style="display: flex; gap: 15px; align-items: flex-end; flex-wrap: wrap;">
        <div style="width: 180px;">
            <label style="display: block; margin-bottom: 5px; font-weight: 500;">股票代码</label>
            <input type="text" id="feature-stock-code" placeholder="如: 600519"
                   style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px;">
        </div>
        <div style="width: 200px;">
            <label style="display: block; margin-bottom: 5px; font-weight: 500;">交易日（可选）</label>
            <input type="date" id="feature-trade-date"
                   style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px;">
        </div>
        <button onclick="queryNewsDailyFeatures()"
                style="padding: 10px 25px; background: #16a34a; color: white; border: none; border-radius: 4px; cursor: pointer;">
            查询新闻特征
        </button>
    </div>
    <div id="news-feature-result" style="margin-top: 15px;">
        <div style="color: #666;">输入股票代码后可查看最新或指定交易日的新闻聚合特征。</div>
    </div>
</div>

<!-- 新闻统计 -->
<div class="card" id="stats-section" style="margin-top: 20px; display: none;">
    <h3>📊 新闻统计</h3>
    <div class="stats-grid" id="news-stats">
        <div class="stat-card">
            <div class="label">新闻总数</div>
            <div class="value" id="total-news">-</div>
        </div>
        <div class="stat-card">
            <div class="label">正面新闻</div>
            <div class="value" style="color: #28a745;" id="positive-news">-</div>
        </div>
        <div class="stat-card">
            <div class="label">负面新闻</div>
            <div class="value" style="color: #dc3545;" id="negative-news">-</div>
        </div>
        <div class="stat-card">
            <div class="label">平均情感</div>
            <div class="value" id="avg-sentiment">-</div>
        </div>
    </div>
    
    <!-- 领域分布 -->
    <div style="margin-top: 20px;">
        <h4 style="margin-bottom: 10px;">领域分布</h4>
        <div id="sector-distribution" style="display: flex; flex-wrap: wrap; gap: 10px;"></div>
    </div>
    
    <!-- 来源分布 -->
    <div style="margin-top: 20px;">
        <h4 style="margin-bottom: 10px;">来源分布</h4>
        <div id="source-distribution" style="display: flex; flex-wrap: wrap; gap: 10px;"></div>
    </div>
</div>

<!-- 新闻列表 -->
<div class="card" style="margin-top: 20px;">
    <h3>📋 新闻列表</h3>
    <div id="news-list" style="margin-top: 15px;">
        <div style="text-align: center; color: #666; padding: 40px;">
            请输入查询条件后点击查询按钮
        </div>
    </div>
</div>

{% endblock %}

{% block scripts %}
<script>
let currentStockCode = '';

const NEWS_FEATURE_LABEL_MAP = {
    news_count: '新闻数量',
    avg_sentiment: '平均情感',
    weighted_sentiment: '加权情绪',
    avg_importance: '平均重要性',
    max_importance: '最大重要性',
    positive_ratio: '正面占比',
    negative_ratio: '负面占比',
    source_count: '来源数量',
    source_entropy: '来源熵',
    news_impact_total: '新闻影响总分',
    news_impact_abs_total: '新闻绝对影响总分',
    news_sentiment_abs_sum: '情绪绝对值总和',
    event_shock_flag: '事件冲击标记',
    sentiment_ewm_3d: '情绪3日指数均值',
    sentiment_ewm_5d: '情绪5日指数均值',
    importance_ewm_3d: '重要性3日指数均值',
    importance_ewm_5d: '重要性5日指数均值',
    news_count_ewm_5d: '新闻数量5日指数均值',
    impact_ewm_5d: '影响总分5日指数均值'
};

const NEWS_FEATURE_PERCENT_KEYS = new Set([
    'avg_importance',
    'max_importance',
    'positive_ratio',
    'negative_ratio',
    'source_entropy'
]);

let NEWS_SOURCE_LABEL_MAP = {
    eastmoney: '东方财富',
    sina: '新浪财经',
    tencent: '腾讯财经',
    all: '全部来源',
    unknown: '未知来源'
};
let NEWS_SOURCE_ITEMS = [];
let NEWS_SOURCE_ADAPTERS = ['json_api', 'html_selector', 'rss'];
let NEWS_SOURCE_ADAPTER_TEMPLATES = {};
let NEWS_SOURCE_EDITING_ID = '';

function showNewsSourceManageMessage(message, isError = false) {
    const el = document.getElementById('news-source-manage-message');
    if (!el) {
        return;
    }
    if (!message) {
        el.style.display = 'none';
        el.textContent = '';
        return;
    }
    el.style.display = 'block';
    el.style.background = isError ? '#fee2e2' : '#dcfce7';
    el.style.color = isError ? '#991b1b' : '#166534';
    el.style.border = `1px solid ${isError ? '#fecaca' : '#bbf7d0'}`;
    el.textContent = message;
}

function renderSourceAdapterOptions() {
    const select = document.getElementById('source-adapter-select');
    if (!select) {
        return;
    }
    const previous = select.value;
    const adapters = Array.isArray(NEWS_SOURCE_ADAPTERS) && NEWS_SOURCE_ADAPTERS.length > 0
        ? NEWS_SOURCE_ADAPTERS
        : ['json_api', 'html_selector', 'rss'];
    select.innerHTML = adapters
        .map(adapter => `<option value="${escapeHtml(String(adapter))}">${escapeHtml(String(adapter))}</option>`)
        .join('');
    if (previous && adapters.includes(previous)) {
        select.value = previous;
    }
    select.onchange = () => applyAdapterTemplate(false);
}

function currentAdapterTemplate() {
    const adapter = String(document.getElementById('source-adapter-select')?.value || '').trim();
    if (!adapter) {
        return {};
    }
    const template = NEWS_SOURCE_ADAPTER_TEMPLATES[adapter];
    if (template && typeof template === 'object') {
        return template;
    }
    return {};
}

function formatAdapterConfigInput() {
    const input = document.getElementById('source-adapter-config-input');
    if (!input) {
        return;
    }
    const raw = String(input.value || '').trim();
    if (!raw) {
        return;
    }
    try {
        const parsed = JSON.parse(raw);
        input.value = JSON.stringify(parsed, null, 2);
    } catch (error) {
        showNewsSourceManageMessage(`adapter_config JSON 格式错误: ${error.message}`, true);
    }
}

function applyAdapterTemplate(force = false) {
    const input = document.getElementById('source-adapter-config-input');
    if (!input) {
        return;
    }
    const current = String(input.value || '').trim();
    if (!force && current) {
        return;
    }
    const template = currentAdapterTemplate();
    input.value = JSON.stringify(template, null, 2);
}

function setAnalyzeResultHtml(html, isError = false) {
    const el = document.getElementById('source-analyze-result');
    if (!el) {
        return;
    }
    el.style.color = isError ? '#b91c1c' : '#475569';
    el.innerHTML = html || '';
}

function renderAnalyzePreview(data) {
    const analysis = data.analysis || {};
    const preview = Array.isArray(data.preview) ? data.preview : [];
    const examples = Array.isArray(analysis.examples) ? analysis.examples : [];

    const previewHtml = preview.length > 0
        ? `<ul style="margin: 6px 0 0 16px; padding: 0;">${
            preview.map(item => `<li style="margin-bottom: 4px;">
                <a href="${escapeHtml(String(item.url || ''))}" target="_blank" rel="noopener noreferrer" style="color:#1d4ed8; text-decoration:none;">
                    ${escapeHtml(String(item.title || ''))}
                </a>
                <span style="color:#64748b; margin-left: 6px;">${escapeHtml(String(item.publish_time || '-'))}</span>
            </li>`).join('')
        }</ul>`
        : '<div style="margin-top:4px; color:#64748b;">未抽取到预览新闻，请检查页面是否需要登录或反爬限制。</div>';

    const exampleText = examples.length > 0 ? examples.map(x => escapeHtml(String(x))).join(' / ') : '无';
    return `
        <div style="color:#166534;">分析完成：已自动填充表单，可直接保存。</div>
        <div style="margin-top:4px;">识别选择器：<code>${escapeHtml(String(analysis.selector || '-'))}</code></div>
        <div>命中条数：${escapeHtml(String(analysis.unique_hit || 0))}，日期命中：${escapeHtml(String(analysis.date_hit || 0))}</div>
        <div>样例标题：${exampleText}</div>
        ${analysis.rss_candidate ? `<div>RSS候选：<code>${escapeHtml(String(analysis.rss_candidate))}</code></div>` : ''}
        <div style="margin-top:6px;">预览：</div>
        ${previewHtml}
    `;
}

async function analyzeNewsSourceUrl() {
    const urlInput = document.getElementById('source-analyze-url');
    const analyzeBtn = document.getElementById('source-analyze-btn');
    const sourceName = document.getElementById('source-name-input').value.trim();
    const keyword = document.getElementById('source-keyword-input').value.trim();
    const url = (urlInput?.value || '').trim();
    if (!url) {
        setAnalyzeResultHtml('请输入要分析的新闻列表URL。', true);
        return;
    }

    analyzeBtn.disabled = true;
    analyzeBtn.textContent = '分析中...';
    setAnalyzeResultHtml('正在分析页面结构，请稍候...');
    try {
        const response = await fetch('/api/news/sources/analyze', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                url,
                source_name: sourceName || '自定义新闻源',
                keyword: keyword || sourceName || '财经'
            })
        });
        const payload = await response.json();
        if (!response.ok || !payload.success) {
            throw new Error(payload.message || '自动分析失败');
        }
        const data = payload.data || {};

        if (!NEWS_SOURCE_EDITING_ID) {
            const sourceIdEl = document.getElementById('source-id-input');
            if (!sourceIdEl.value.trim()) {
                sourceIdEl.value = String(data.suggested_source_id || '');
            }
        }
        const sourceNameEl = document.getElementById('source-name-input');
        if (!sourceNameEl.value.trim() && data.suggested_name) {
            sourceNameEl.value = String(data.suggested_name);
        }
        const keywordEl = document.getElementById('source-keyword-input');
        if (!keywordEl.value.trim() && data.keyword) {
            keywordEl.value = String(data.keyword);
        }

        const adapter = String(data.adapter || 'html_selector');
        document.getElementById('source-adapter-select').value = adapter;
        document.getElementById('source-adapter-config-input').value = JSON.stringify(data.adapter_config || {}, null, 2);

        setAnalyzeResultHtml(renderAnalyzePreview(data), false);
        showNewsSourceManageMessage('自动分析成功，配置已填充到表单。');
    } catch (error) {
        console.error('自动分析新闻源失败:', error);
        setAnalyzeResultHtml(`自动分析失败：${escapeHtml(error.message)}`, true);
        showNewsSourceManageMessage(`自动分析失败: ${error.message}`, true);
    } finally {
        analyzeBtn.disabled = false;
        analyzeBtn.textContent = '自动分析并填充';
    }
}

function renderNewsSourceSelect(preserveSelection = true) {
    const select = document.getElementById('news-source');
    if (!select) {
        return;
    }

    const previous = preserveSelection ? select.value : '';
    const enabledSources = NEWS_SOURCE_ITEMS.filter(item => item && item.enabled !== false);

    const optionHtml = enabledSources
        .map(item => `<option value="${escapeHtml(String(item.source_id || ''))}">${escapeHtml(String(item.name || item.source_id || '未命名新闻源'))}</option>`)
        .join('');
    select.innerHTML = `${optionHtml}<option value="all">全部来源</option>`;

    if (previous && [...select.options].some(op => op.value === previous)) {
        select.value = previous;
    } else if (enabledSources.length > 0) {
        select.value = String(enabledSources[0].source_id || 'all');
    } else {
        select.value = 'all';
    }
}

function renderNewsSourceList() {
    const container = document.getElementById('news-source-list');
    if (!container) {
        return;
    }
    if (!NEWS_SOURCE_ITEMS.length) {
        container.innerHTML = '<div style="padding: 12px; color: #64748b;">暂无新闻源配置</div>';
        return;
    }

    const rows = NEWS_SOURCE_ITEMS.map(item => {
        const sourceId = String(item.source_id || '');
        const encodedId = encodeURIComponent(sourceId);
        const enabledText = item.enabled === false ? '禁用' : '启用';
        const enabledColor = item.enabled === false ? '#64748b' : '#16a34a';
        const builtIn = item.is_builtin ? '内置' : '自定义';
        const cfg = item.adapter_config && typeof item.adapter_config === 'object' ? item.adapter_config : {};
        const configSummary = cfg.preset
            ? `preset=${String(cfg.preset)}`
            : Object.keys(cfg).slice(0, 3).join(', ') || '-';
        return `
            <tr style="border-top: 1px solid #e2e8f0;">
                <td style="padding: 8px 10px; white-space: nowrap;">${escapeHtml(sourceId)}</td>
                <td style="padding: 8px 10px;">${escapeHtml(String(item.name || '-'))}</td>
                <td style="padding: 8px 10px;">${escapeHtml(String(item.adapter || '-'))}</td>
                <td style="padding: 8px 10px;">${escapeHtml(String(item.keyword || '-'))}</td>
                <td style="padding: 8px 10px;">${escapeHtml(configSummary)}</td>
                <td style="padding: 8px 10px; color: ${enabledColor};">${enabledText}</td>
                <td style="padding: 8px 10px;">${escapeHtml(String(item.sort_order ?? 100))}</td>
                <td style="padding: 8px 10px;">${builtIn}</td>
                <td style="padding: 8px 10px; min-width: 140px;">
                    <button onclick="editNewsSource('${encodedId}')" style="padding: 4px 8px; border: 1px solid #cbd5e1; background: white; border-radius: 4px; cursor: pointer;">编辑</button>
                    <button onclick="deleteNewsSource('${encodedId}')" style="padding: 4px 8px; border: 1px solid #fecaca; background: #fff1f2; color: #b91c1c; border-radius: 4px; cursor: pointer; margin-left: 6px;">删除</button>
                </td>
            </tr>
        `;
    }).join('');

    container.innerHTML = `
        <div style="overflow-x: auto;">
            <table style="width: 100%; border-collapse: collapse; font-size: 13px;">
                <thead style="background: #f8fafc;">
                    <tr>
                        <th style="padding: 8px 10px; text-align: left;">source_id</th>
                        <th style="padding: 8px 10px; text-align: left;">名称</th>
                        <th style="padding: 8px 10px; text-align: left;">adapter</th>
                        <th style="padding: 8px 10px; text-align: left;">keyword</th>
                        <th style="padding: 8px 10px; text-align: left;">adapter_config</th>
                        <th style="padding: 8px 10px; text-align: left;">状态</th>
                        <th style="padding: 8px 10px; text-align: left;">排序</th>
                        <th style="padding: 8px 10px; text-align: left;">类型</th>
                        <th style="padding: 8px 10px; text-align: left;">操作</th>
                    </tr>
                </thead>
                <tbody>${rows}</tbody>
            </table>
        </div>
    `;
}

function resetNewsSourceForm() {
    NEWS_SOURCE_EDITING_ID = '';
    document.getElementById('source-id-input').value = '';
    document.getElementById('source-id-input').disabled = false;
    document.getElementById('source-name-input').value = '';
    if (NEWS_SOURCE_ADAPTERS.length > 0) {
        document.getElementById('source-adapter-select').value = String(NEWS_SOURCE_ADAPTERS[0]);
    }
    document.getElementById('source-keyword-input').value = '';
    document.getElementById('source-description-input').value = '';
    document.getElementById('source-sort-order-input').value = '100';
    document.getElementById('source-adapter-config-input').value = '';
    document.getElementById('source-enabled-checkbox').checked = true;
    document.getElementById('source-form-mode').textContent = '当前模式：新增';
    applyAdapterTemplate(true);
    showNewsSourceManageMessage('');
}

async function loadNewsSources(preserveSelection = true) {
    try {
        const response = await fetch('/api/news/sources?include_disabled=1');
        const payload = await response.json();
        if (!response.ok || !payload.success) {
            throw new Error(payload.message || '加载新闻源失败');
        }
        const data = payload.data || {};
        NEWS_SOURCE_ITEMS = Array.isArray(data.sources) ? data.sources : [];
        NEWS_SOURCE_ADAPTERS = Array.isArray(data.adapters) && data.adapters.length
            ? data.adapters
            : ['json_api', 'html_selector', 'rss'];
        NEWS_SOURCE_ADAPTER_TEMPLATES = (data.adapter_templates && typeof data.adapter_templates === 'object')
            ? data.adapter_templates
            : {};

        NEWS_SOURCE_LABEL_MAP = { all: '全部来源', unknown: '未知来源' };
        NEWS_SOURCE_ITEMS.forEach(item => {
            const sourceId = String(item.source_id || '').trim();
            const sourceName = String(item.name || sourceId || '').trim();
            if (sourceId && sourceName) {
                NEWS_SOURCE_LABEL_MAP[sourceId] = sourceName;
            }
        });

        renderSourceAdapterOptions();
        renderNewsSourceSelect(preserveSelection);
        renderNewsSourceList();
    } catch (error) {
        console.error('加载新闻源配置失败:', error);
        showNewsSourceManageMessage(`加载新闻源配置失败: ${error.message}`, true);
    }
}

function editNewsSource(encodedSourceId) {
    const sourceId = decodeURIComponent(String(encodedSourceId || ''));
    const source = NEWS_SOURCE_ITEMS.find(item => String(item.source_id || '') === sourceId);
    if (!source) {
        showNewsSourceManageMessage(`未找到新闻源: ${sourceId}`, true);
        return;
    }

    NEWS_SOURCE_EDITING_ID = sourceId;
    document.getElementById('source-id-input').value = sourceId;
    document.getElementById('source-id-input').disabled = true;
    document.getElementById('source-name-input').value = String(source.name || '');
    document.getElementById('source-adapter-select').value = String(source.adapter || NEWS_SOURCE_ADAPTERS[0] || 'json_api');
    document.getElementById('source-keyword-input').value = String(source.keyword || '');
    document.getElementById('source-sort-order-input').value = String(source.sort_order ?? 100);
    document.getElementById('source-description-input').value = String(source.description || '');
    const adapterConfig = source.adapter_config && typeof source.adapter_config === 'object' ? source.adapter_config : {};
    document.getElementById('source-adapter-config-input').value = JSON.stringify(adapterConfig, null, 2);
    document.getElementById('source-enabled-checkbox').checked = source.enabled !== false;
    document.getElementById('source-form-mode').textContent = `当前模式：编辑 ${sourceId}`;
    showNewsSourceManageMessage('');
}

async function submitNewsSourceForm() {
    const sourceIdInput = document.getElementById('source-id-input').value.trim();
    const name = document.getElementById('source-name-input').value.trim();
    const adapter = document.getElementById('source-adapter-select').value;
    const keyword = document.getElementById('source-keyword-input').value.trim();
    const sortOrderRaw = Number.parseInt(document.getElementById('source-sort-order-input').value || '100', 10);
    const description = document.getElementById('source-description-input').value.trim();
    const adapterConfigText = document.getElementById('source-adapter-config-input').value.trim();
    const enabled = !!document.getElementById('source-enabled-checkbox').checked;

    if (!name) {
        showNewsSourceManageMessage('显示名称不能为空', true);
        return;
    }

    let adapterConfig = {};
    if (adapterConfigText) {
        try {
            const parsed = JSON.parse(adapterConfigText);
            if (!parsed || typeof parsed !== 'object' || Array.isArray(parsed)) {
                throw new Error('adapter_config 需要是JSON对象');
            }
            adapterConfig = parsed;
        } catch (error) {
            showNewsSourceManageMessage(`adapter_config JSON 格式错误: ${error.message}`, true);
            return;
        }
    } else {
        adapterConfig = currentAdapterTemplate();
    }

    const payload = {
        name,
        adapter,
        keyword: keyword || name,
        sort_order: Number.isFinite(sortOrderRaw) ? sortOrderRaw : 100,
        description,
        adapter_config: adapterConfig,
        enabled
    };

    let url = '/api/news/sources';
    let method = 'POST';
    if (NEWS_SOURCE_EDITING_ID) {
        url = `/api/news/sources/${encodeURIComponent(NEWS_SOURCE_EDITING_ID)}`;
        method = 'PUT';
    } else if (sourceIdInput) {
        payload.source_id = sourceIdInput;
    }

    const saveBtn = document.getElementById('news-source-save-btn');
    saveBtn.disabled = true;
    saveBtn.textContent = '保存中...';

    try {
        const response = await fetch(url, {
            method,
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        const result = await response.json();
        if (!response.ok || !result.success) {
            throw new Error(result.message || '保存失败');
        }

        resetNewsSourceForm();
        await loadNewsSources(true);
        showNewsSourceManageMessage(result.message || '保存成功');
    } catch (error) {
        console.error('保存新闻源失败:', error);
        showNewsSourceManageMessage(`保存失败: ${error.message}`, true);
    } finally {
        saveBtn.disabled = false;
        saveBtn.textContent = '保存新闻源';
    }
}

async function deleteNewsSource(encodedSourceId) {
    const sourceId = decodeURIComponent(String(encodedSourceId || ''));
    const source = NEWS_SOURCE_ITEMS.find(item => String(item.source_id || '') === sourceId);
    const sourceName = source ? String(source.name || sourceId) : sourceId;
    if (!window.confirm(`确认删除新闻源「${sourceName}」?`)) {
        return;
    }

    try {
        const response = await fetch(`/api/news/sources/${encodeURIComponent(sourceId)}`, {
            method: 'DELETE'
        });
        const payload = await response.json();
        if (!response.ok || !payload.success) {
            throw new Error(payload.message || '删除失败');
        }
        if (NEWS_SOURCE_EDITING_ID === sourceId) {
            resetNewsSourceForm();
        }
        await loadNewsSources(true);
        showNewsSourceManageMessage(payload.message || '删除成功');
    } catch (error) {
        console.error('删除新闻源失败:', error);
        showNewsSourceManageMessage(`删除失败: ${error.message}`, true);
    }
}

async function loadNews() {
    const stockCode = document.getElementById('stock-code').value.trim();
    const newsSource = document.getElementById('news-source').value;
    const limit = Number.parseInt(document.getElementById('news-limit').value || '30', 10);
    const maxAgeInput = Number.parseInt(document.getElementById('news-max-age-hours').value || '72', 10);
    const maxAgeHours = Number.isFinite(maxAgeInput) ? Math.min(2160, Math.max(1, maxAgeInput)) : 72;
    document.getElementById('news-max-age-hours').value = String(maxAgeHours);
    
    currentStockCode = stockCode;
    
    const newsListDiv = document.getElementById('news-list');
    newsListDiv.innerHTML = '<div style="text-align: center; padding: 40px;">⏳ 加载中...</div>';
    
    try {
        let url = `/api/news?limit=${Number.isFinite(limit) ? limit : 30}&source=${newsSource}&max_age_hours=${maxAgeHours}`;
        if (stockCode) {
            url += `&stock_code=${stockCode}`;
        }
        
        const response = await fetch(url);
        const data = await response.json();
        
        if (data.success) {
            displayNews(data.data.news);
            displayStatistics(data.data.statistics);
            
            // 如果有股票代码，加载影响分析
            if (stockCode) {
                loadImpactAnalysis(stockCode);
            } else {
                document.getElementById('impact-section').style.display = 'none';
            }
        } else {
            newsListDiv.innerHTML = `<div style="text-align: center; color: #dc3545; padding: 40px;">❌ ${data.message}</div>`;
        }
    } catch (error) {
        console.error('加载新闻失败:', error);
        newsListDiv.innerHTML = '<div style="text-align: center; color: #dc3545; padding: 40px;">❌ 加载失败，请稍后重试</div>';
    }
}

// 加载新闻影响分析
async function loadImpactAnalysis(stockCode) {
    const impactSection = document.getElementById('impact-section');
    const impactContent = document.getElementById('impact-content');
    
    impactSection.style.display = 'block';
    impactContent.innerHTML = '<div style="text-align: center; padding: 20px;">⏳ 分析中...</div>';
    
    try {
        const response = await fetch(`/api/analysis/news-impact/${stockCode}`);
        const data = await response.json();
        
        if (data.success && data.data) {
            displayImpactAnalysis(data.data);
        } else {
            impactContent.innerHTML = '<div style="color: #666;">暂无影响分析数据</div>';
        }
    } catch (error) {
        console.error('加载影响分析失败:', error);
        impactContent.innerHTML = '<div style="color: #dc3545;">影响分析加载失败</div>';
    }
}

// 显示影响分析
function displayImpactAnalysis(data) {
    const impactContent = document.getElementById('impact-content');
    
    if (!data || !data.impact_assessment) {
        impactContent.innerHTML = '<div style="color: #666;">暂无影响分析数据</div>';
        return;
    }
    
    const impact = data.impact_assessment;
    const sentimentScore = impact.overall_sentiment || 0;
    const sentimentColor = sentimentScore > 0.2 ? '#28a745' : (sentimentScore < -0.2 ? '#dc3545' : '#6c757d');
    const sentimentText = sentimentScore > 0.2 ? '偏正面' : (sentimentScore < -0.2 ? '偏负面' : '中性');
    
    let html = `
        <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px;">
            <div style="background: #f8f9fa; padding: 15px; border-radius: 8px; text-align: center;">
                <div style="font-size: 12px; color: #666;">综合情感</div>
                <div style="font-size: 24px; font-weight: bold; color: ${sentimentColor};">${sentimentText}</div>
                <div style="font-size: 12px; color: #888;">${sentimentScore.toFixed(2)}</div>
            </div>
            <div style="background: #f8f9fa; padding: 15px; border-radius: 8px; text-align: center;">
                <div style="font-size: 12px; color: #666;">新闻数量</div>
                <div style="font-size: 24px; font-weight: bold;">${data.total_news || 0}</div>
                <div style="font-size: 12px; color: #888;">条相关新闻</div>
            </div>
            <div style="background: #f8f9fa; padding: 15px; border-radius: 8px; text-align: center;">
                <div style="font-size: 12px; color: #666;">影响权重</div>
                <div style="font-size: 24px; font-weight: bold;">${((impact.weighted_impact || 0) * 100).toFixed(0)}%</div>
                <div style="font-size: 12px; color: #888;">综合影响强度</div>
            </div>
            <div style="background: #f8f9fa; padding: 15px; border-radius: 8px; text-align: center;">
                <div style="font-size: 12px; color: #666;">信心指数</div>
                <div style="font-size: 24px; font-weight: bold;">${((impact.confidence || 0.5) * 100).toFixed(0)}%</div>
                <div style="font-size: 12px; color: #888;">分析置信度</div>
            </div>
        </div>
    `;
    
    // 关键影响因素
    if (impact.key_factors && impact.key_factors.length > 0) {
        html += `
            <div style="margin-top: 15px;">
                <h4 style="margin: 0 0 10px 0; font-size: 14px;">关键影响因素</h4>
                <div style="display: flex; flex-wrap: wrap; gap: 8px;">
                    ${impact.key_factors.map(f => `
                        <span style="background: ${f.impact > 0 ? '#d4edda' : '#f8d7da'}; 
                                     color: ${f.impact > 0 ? '#155724' : '#721c24'}; 
                                     padding: 5px 12px; border-radius: 15px; font-size: 12px;">
                            ${f.factor} (${f.impact > 0 ? '+' : ''}${(f.impact * 100).toFixed(0)}%)
                        </span>
                    `).join('')}
                </div>
            </div>
        `;
    }
    
    // 建议操作
    if (impact.suggestion) {
        html += `
            <div style="margin-top: 15px; padding: 15px; background: #e7f3ff; border-radius: 8px; border-left: 4px solid #007bff;">
                <strong>💡 参考建议</strong>
                <p style="margin: 5px 0 0 0; font-size: 14px;">${impact.suggestion}</p>
            </div>
        `;
    }
    
    impactContent.innerHTML = html;
}

function displayStatistics(stats) {
    document.getElementById('stats-section').style.display = 'block';
    document.getElementById('total-news').textContent = stats.total || 0;
    document.getElementById('positive-news').textContent = stats.sentiment_distribution?.positive || 0;
    document.getElementById('negative-news').textContent = stats.sentiment_distribution?.negative || 0;
    
    const avgSentiment = stats.avg_sentiment || 0;
    const sentimentEl = document.getElementById('avg-sentiment');
    sentimentEl.textContent = avgSentiment.toFixed(2);
    sentimentEl.style.color = avgSentiment > 0.1 ? '#28a745' : (avgSentiment < -0.1 ? '#dc3545' : '#666');
    
    // 领域分布
    const sectorDiv = document.getElementById('sector-distribution');
    const sectors = stats.sector_distribution || {};
    sectorDiv.innerHTML = Object.entries(sectors).map(([sector, count]) => 
        `<span style="background: #e9ecef; padding: 5px 12px; border-radius: 15px; font-size: 13px;">
            ${sector} (${count})
        </span>`
    ).join('') || '<span style="color: #888;">暂无数据</span>';
    
    // 来源分布
    const sourceDiv = document.getElementById('source-distribution');
    const sources = stats.source_distribution || {};
    const sourceNameMap = stats.source_name_map || {};
    sourceDiv.innerHTML = Object.entries(sources).map(([source, count]) => 
        `<span style="background: #d4edda; color: #155724; padding: 5px 12px; border-radius: 15px; font-size: 13px;">
            ${escapeHtml(sourceNameMap[source] || getNewsSourceLabel(source))} (${count})
        </span>`
    ).join('') || '<span style="color: #888;">暂无数据</span>';
}

function displayNews(newsList) {
    const newsListDiv = document.getElementById('news-list');
    
    if (!newsList || newsList.length === 0) {
        newsListDiv.innerHTML = '<div style="text-align: center; color: #666; padding: 40px;">暂无新闻数据</div>';
        return;
    }
    
    newsListDiv.innerHTML = newsList.map(news => {
        const sentiment = news.sentiment || 0;
        const sentimentColor = sentiment > 0.2 ? '#28a745' : (sentiment < -0.2 ? '#dc3545' : '#6c757d');
        const sentimentText = sentiment > 0.2 ? '正面' : (sentiment < -0.2 ? '负面' : '中性');
        const sourceUrl = normalizeNewsUrl(news.url || '');
        const titleHtml = sourceUrl
            ? `<a href="${escapeHtml(sourceUrl)}" target="_blank" rel="noopener noreferrer" style="color:#1d4ed8; text-decoration:none;" onmouseover="this.style.textDecoration='underline'" onmouseout="this.style.textDecoration='none'">${escapeHtml(news.title)}</a>`
            : escapeHtml(news.title);
        
        return `
            <div style="border: 1px solid #eee; border-radius: 8px; padding: 15px; margin-bottom: 15px; transition: box-shadow 0.2s;" 
                 onmouseover="this.style.boxShadow='0 2px 8px rgba(0,0,0,0.1)'" 
                 onmouseout="this.style.boxShadow='none'">
                <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px;">
                    <h4 style="margin: 0; flex: 1; font-size: 16px; color: #333;">${titleHtml}</h4>
                    <span style="background: ${sentimentColor}20; color: ${sentimentColor}; padding: 3px 10px; border-radius: 12px; font-size: 12px; margin-left: 10px; white-space: nowrap;">
                        ${sentimentText}
                    </span>
                </div>
                <p style="margin: 8px 0; color: #666; font-size: 14px; line-height: 1.5;">
                    ${escapeHtml(news.content ? news.content.substring(0, 200) + '...' : '')}
                </p>
                <div style="display: flex; gap: 20px; font-size: 12px; color: #888;">
                    <span>📅 ${news.publish_time || '未知时间'}</span>
                    <span>📍 ${escapeHtml(String(news.source_name || getNewsSourceLabel(news.source || 'unknown')))}</span>
                    <span>⭐ 重要性: ${((news.importance || 0.5) * 100).toFixed(0)}%</span>
                    <span>📊 情感: ${sentiment.toFixed(2)}</span>
                </div>
                <div style="margin-top: 8px;">
                    ${sourceUrl
                        ? `<a href="${escapeHtml(sourceUrl)}" target="_blank" rel="noopener noreferrer" style="font-size: 13px; color: #2563eb;">查看新闻全文 ↗</a>`
                        : '<span style="font-size: 12px; color: #94a3b8;">暂无原文链接</span>'
                    }
                </div>
                ${news.categories && news.categories.length > 0 ? `
                    <div style="margin-top: 8px;">
                        ${news.categories.map(cat => `<span style="background: #007bff20; color: #007bff; padding: 2px 8px; border-radius: 10px; font-size: 11px; margin-right: 5px;">${cat}</span>`).join('')}
                    </div>
                ` : ''}
            </div>
        `;
    }).join('');
}

async function queryNewsDailyFeatures() {
    const stockCode = document.getElementById('feature-stock-code').value.trim();
    const tradeDate = document.getElementById('feature-trade-date').value;
    const resultEl = document.getElementById('news-feature-result');

    if (!stockCode) {
        resultEl.innerHTML = '<div style="color: #dc3545;">请输入股票代码</div>';
        return;
    }

    resultEl.innerHTML = '<div style="color: #666;">⏳ 查询中...</div>';

    try {
        let url = `/api/features/news/${encodeURIComponent(stockCode)}`;
        if (tradeDate) {
            url += `?trade_date=${encodeURIComponent(tradeDate)}`;
        }

        const response = await fetch(url);
        const payload = await response.json();
        if (!response.ok || !payload.success) {
            throw new Error(payload.message || '查询失败');
        }

        const data = payload.data || {};
        if (!data.available) {
            resultEl.innerHTML = `
                <div style="padding: 12px; border-radius: 8px; background: #f8fafc; color: #334155;">
                    ${escapeHtml(data.message || '暂无数据')}
                </div>
            `;
            return;
        }

        const importantKeys = [
            'news_count',
            'avg_sentiment',
            'weighted_sentiment',
            'avg_importance',
            'max_importance',
            'positive_ratio',
            'negative_ratio',
            'source_count',
            'source_entropy',
            'news_impact_total',
            'news_impact_abs_total',
            'event_shock_flag'
        ];
        const features = data.features || {};
        const cards = importantKeys
            .filter(key => features[key] !== undefined && features[key] !== null)
            .map(key => `
                <div style="border: 1px solid #e2e8f0; border-radius: 8px; padding: 10px;">
                    <div style="font-size: 12px; color: #64748b;">${escapeHtml(getNewsFeatureLabel(key))}</div>
                    <div style="font-size: 18px; font-weight: 700; color: #0f172a;">
                        ${formatNewsFeatureValue(key, features[key])}
                    </div>
                </div>
            `).join('');

        resultEl.innerHTML = `
            <div style="padding: 12px; border-radius: 8px; background: #f8fafc; margin-bottom: 12px;">
                <div><strong>股票:</strong> ${escapeHtml(data.stock_code || stockCode)}</div>
                <div><strong>交易日:</strong> ${escapeHtml(data.trade_date || '-')}</div>
                <div><strong>特征数量:</strong> ${data.feature_count || 0}</div>
            </div>
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 8px;">
                ${cards || '<div style="color:#666;">暂无核心指标</div>'}
            </div>
            <details style="margin-top: 12px;">
                <summary style="cursor: pointer; color: #2563eb;">查看完整原始特征数据</summary>
                <pre style="margin-top: 8px; padding: 10px; background: #0f172a; color: #e2e8f0; border-radius: 8px; overflow-x: auto;">${escapeHtml(JSON.stringify(features, null, 2))}</pre>
            </details>
        `;
    } catch (error) {
        console.error('查询新闻特征失败:', error);
        resultEl.innerHTML = `<div style="color: #dc3545;">❌ ${escapeHtml(error.message)}</div>`;
    }
}

function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function getNewsFeatureLabel(key) {
    return NEWS_FEATURE_LABEL_MAP[key] || key;
}

function formatNewsFeatureValue(key, value) {
    if (value === null || value === undefined || value === '') {
        return '-';
    }

    if (typeof value !== 'number') {
        return escapeHtml(String(value));
    }

    if (NEWS_FEATURE_PERCENT_KEYS.has(key)) {
        return `${(value * 100).toFixed(2)}%`;
    }
    if (key === 'event_shock_flag') {
        return Number(value) >= 0.5 ? '是' : '否';
    }

    return Number(value).toFixed(4);
}

function getNewsSourceLabel(source) {
    const key = String(source || '').trim();
    if (!key) {
        return '未知来源';
    }
    if (NEWS_SOURCE_LABEL_MAP[key]) {
        return NEWS_SOURCE_LABEL_MAP[key];
    }
    const found = NEWS_SOURCE_ITEMS.find(item => {
        const sourceId = String(item.source_id || '').trim();
        const sourceName = String(item.name || '').trim();
        return key === sourceId || key === sourceName;
    });
    if (found) {
        return String(found.name || found.source_id || key);
    }
    return key;
}

function normalizeNewsUrl(url) {
    const text = String(url || '').trim();
    if (!text) {
        return '';
    }
    if (text.startsWith('http://') || text.startsWith('https://')) {
        return text;
    }
    if (text.startsWith('//')) {
        return `https:${text}`;
    }
    return '';
}

// 页面加载时查询
document.addEventListener('DOMContentLoaded', async function() {
    renderSourceAdapterOptions();
    resetNewsSourceForm();
    await loadNewsSources(false);
    loadNews();
});
