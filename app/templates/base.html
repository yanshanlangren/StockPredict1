<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>股票交易AI系统</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
    <div class="container">
        <!-- 顶部导航 -->
        <header class="header">
            <h1>📈 股票交易AI系统</h1>
            <nav class="nav">
                <a href="{{ url_for('index') }}" class="nav-link {% if request.endpoint == 'index' %}active{% endif %}">首页</a>
                <a href="{{ url_for('stock_page') }}" class="nav-link {% if request.endpoint == 'stock_page' %}active{% endif %}">股票</a>
                <a href="{{ url_for('model_page') }}" class="nav-link {% if request.endpoint == 'model_page' %}active{% endif %}">单股预测</a>
                <a href="{{ url_for('predict_page') }}" class="nav-link {% if request.endpoint == 'predict_page' %}active{% endif %}">批量预测</a>
                <a href="{{ url_for('news_page') }}" class="nav-link {% if request.endpoint == 'news_page' %}active{% endif %}">📰 新闻</a>
                <a href="{{ url_for('company_page') }}" class="nav-link {% if request.endpoint == 'company_page' %}active{% endif %}">🏢 公司</a>
                <a href="{{ url_for('news_impact_page') }}" class="nav-link {% if request.endpoint == 'news_impact_page' %}active{% endif %}">📊 影响分析</a>
                <a href="{{ url_for('relevance_page') }}" class="nav-link {% if request.endpoint == 'relevance_page' %}active{% endif %}">🔗 相关图谱</a>
            </nav>
        </header>

        <!-- 主要内容 -->
        <main class="main">
            {% block content %}{% endblock %}
        </main>

        <!-- 页脚 -->
        <footer class="footer">
            <p>© 2026 股票交易AI系统 | 基于全局模型预测 | 使用腾讯财经数据</p>
        </footer>
    </div>

    <!-- 加载JavaScript -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
