{% extends "base.html" %}

{% block content %}
<div class="card">
    <h2>📊 股票查询</h2>

    <div class="form-group">
        <label for="stock-code">股票代码：</label>
        <div style="display: flex; gap: 10px; align-items: center;">
            <input type="text" id="stock-code-input" placeholder="输入或选择股票代码（6位数字，如600000）"
                   style="flex: 1; padding: 8px; border: 1px solid #ddd; border-radius: 4px;"
                   oninput="filterStockList()" onkeydown="if(event.key === 'Enter') loadStockData()">
            <select id="stock-code" style="flex: 1; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
                <option value="">加载中...</option>
            </select>
        </div>
        <small style="color: #666; display: block; margin-top: 5px;">
            💡 股票代码必须是6位数字（沪市以6开头，深市以0/3开头），如：600000、000001、300001
        </small>
    </div>

    <div class="form-group">
        <label for="days">获取天数：</label>
        <input type="number" id="days" value="100" min="30" max="500">
    </div>

    <button class="btn btn-primary" onclick="loadStockData()">查询</button>
</div>

<div id="stock-info"></div>

<div id="stock-chart" class="card" style="display: none;">
    <h2>📈 股价走势</h2>
    <div class="chart-container">
        <canvas id="klineChart"></canvas>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
// 全局变量存储股票列表
let allStocks = [];

// 加载股票列表
async function loadStockList() {
    try {
        const response = await fetch('/api/stocks');
        const data = await response.json();

        if (data.success) {
            allStocks = data.data;  // 保存到全局变量
            updateStockSelect(allStocks);
            console.log(`已加载 ${data.total} 只股票`);
        } else {
            console.error('加载股票列表失败:', data.message);
            document.getElementById('stock-code').innerHTML = '<option value="">加载失败</option>';
        }
    } catch (error) {
        console.error('加载股票列表失败:', error);
        document.getElementById('stock-code').innerHTML = '<option value="">加载失败</option>';
    }
}

// 更新股票选择框
function updateStockSelect(stocks) {
    const select = document.getElementById('stock-code');
    select.innerHTML = '<option value="">选择股票...</option>';

    // 添加股票选项
    stocks.forEach(stock => {
        const option = document.createElement('option');
        option.value = stock.code;
        option.textContent = `${stock.code} - ${stock.name}`;
        select.appendChild(option);
    });
}

// 过滤股票列表
function filterStockList() {
    const filterText = document.getElementById('stock-code-input').value.toLowerCase().trim();

    if (!filterText) {
        // 如果过滤框为空，显示所有股票
        updateStockSelect(allStocks);
        return;
    }

    // 过滤股票列表
    const filteredStocks = allStocks.filter(stock => {
        return stock.code.includes(filterText) ||
               stock.name.toLowerCase().includes(filterText);
    });

    updateStockSelect(filteredStocks);

    // 自动选择第一个匹配的股票
    if (filteredStocks.length > 0) {
        document.getElementById('stock-code').value = filteredStocks[0].code;
    }
}

// 同步输入框和选择框
document.getElementById('stock-code').addEventListener('change', function() {
    const selectedCode = this.value;
    if (selectedCode) {
        document.getElementById('stock-code-input').value = selectedCode;
    }
});

// 加载股票数据
async function loadStockData() {
    const stockCodeInput = document.getElementById('stock-code-input').value.trim();
    const stockCodeSelect = document.getElementById('stock-code').value;
    const days = document.getElementById('days').value;

    // 优先使用输入框的值，如果为空则使用下拉框的值
    const stockCode = stockCodeInput || stockCodeSelect;

    if (!stockCode) {
        alert('请选择或输入股票代码');
        return;
    }

    // 验证股票代码格式（6位数字）
    if (!/^\d{6}$/.test(stockCode)) {
        alert('股票代码格式不正确，请输入6位数字（如：600000、000001）');
        return;
    }

    const infoDiv = document.getElementById('stock-info');
    const chartDiv = document.getElementById('stock-chart');

    // 显示加载状态
    showLoading('stock-info');
    chartDiv.style.display = 'none';

    try {
        // 获取股票信息
        const response = await apiRequest(`/api/stock/${stockCode}?days=${days}`);

        if (response.success) {
            const data = response.data;

            // 显示统计信息
            const statsHtml = `
                <div class="card">
                    <h2>📋 ${data.code} - 基本信息</h2>
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="label">当前价格</div>
                            <div class="value">${data.stats.current}</div>
                        </div>
                        <div class="stat-card ${data.stats.change >= 0 ? 'positive' : 'negative'}">
                            <div class="label">涨跌幅</div>
                            <div class="value">${formatPercent(data.stats.change)}</div>
                        </div>
                        <div class="stat-card">
                            <div class="label">最高价</div>
                            <div class="value">${data.stats.high}</div>
                        </div>
                        <div class="stat-card">
                            <div class="label">最低价</div>
                            <div class="value">${data.stats.low}</div>
                        </div>
                        <div class="stat-card">
                            <div class="label">总成交量</div>
                            <div class="value" style="font-size: 20px;">${(data.stats.volume / 100000000).toFixed(2)}亿</div>
                        </div>
                        <div class="stat-card">
                            <div class="label">数据天数</div>
                            <div class="value">${data.stats.days}</div>
                        </div>
                    </div>
                </div>
            `;

            infoDiv.innerHTML = statsHtml;

            // 显示图表
            chartDiv.style.display = 'block';
            createKLineChart('klineChart', data.kline);

            // 更新URL参数
            const url = new URL(window.location);
            url.searchParams.set('code', stockCode);
            window.history.pushState({}, '', url);

        } else {
            showError('stock-info', response.message);
        }

    } catch (error) {
        showError('stock-info', error.message);
    }
}

// 页面加载时
document.addEventListener('DOMContentLoaded', function() {
    // 加载股票列表
    loadStockList();

    // 检查URL参数
    const urlParams = new URLSearchParams(window.location.search);
    const code = urlParams.get('code');

    if (code) {
        // 等待股票列表加载完成后选择股票
        setTimeout(() => {
            document.getElementById('stock-code').value = code;
            loadStockData();
        }, 500);
    }
});
</script>
{% endblock %}
