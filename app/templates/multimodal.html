{% extends "base.html" %}

{% block content %}
<!-- 多模态预测 -->
<div class="card">
    <h2>🤖 多模态预测</h2>
    <p style="color: #666; margin-bottom: 20px;">
        融合新闻情感、领域影响、相关性矩阵和技术指标的综合预测模型
    </p>
    
    <!-- 搜索区域 -->
    <div style="margin-bottom: 20px;">
        <div style="display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 15px; margin-bottom: 15px;">
            <div>
                <label style="display: block; margin-bottom: 5px; font-weight: 500;">股票代码</label>
                <input type="text" id="stock-code" placeholder="如: 600519" value="600519"
                       style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px;">
            </div>
            <div>
                <label style="display: block; margin-bottom: 5px; font-weight: 500;">历史天数</label>
                <input type="number" id="days" value="100" min="60" max="500"
                       style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px;">
            </div>
            <div>
                <label style="display: block; margin-bottom: 5px; font-weight: 500;">新闻数据</label>
                <select id="use-news" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px;">
                    <option value="true" selected>启用</option>
                    <option value="false">禁用</option>
                </select>
            </div>
            <div>
                <label style="display: block; margin-bottom: 5px; font-weight: 500;">相关性数据</label>
                <select id="use-relevance" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px;">
                    <option value="true" selected>启用</option>
                    <option value="false">禁用</option>
                </select>
            </div>
        </div>
        
        <button onclick="runPrediction()" 
                style="width: 100%; padding: 12px; font-size: 16px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: 500;">
            🚀 开始多模态预测
        </button>
    </div>
</div>

<!-- 预测结果 -->
<div id="result-section" style="display: none;">
    <!-- 核心预测结果 -->
    <div class="card" style="margin-top: 20px;">
        <h3>📊 预测结果</h3>
        <div id="prediction-result" style="margin-top: 15px;"></div>
    </div>
    
    <!-- 特征融合情况 -->
    <div class="card" style="margin-top: 20px;">
        <h3>🔧 特征融合情况</h3>
        <div id="features-used" style="margin-top: 15px;"></div>
    </div>
    
    <!-- 特征详情 -->
    <div class="card" style="margin-top: 20px;">
        <h3>📈 特征详情</h3>
        <div id="feature-details" style="margin-top: 15px;"></div>
    </div>
</div>

<!-- 加载状态 -->
<div id="loading-section" style="display: none;">
    <div class="card" style="margin-top: 20px;">
        <div style="text-align: center; padding: 60px;">
            <div style="font-size: 48px; margin-bottom: 20px;">⏳</div>
            <div style="font-size: 18px; color: #333;">正在进行多模态预测...</div>
            <div style="margin-top: 10px; color: #666;">正在融合新闻、技术指标、相关性数据</div>
        </div>
    </div>
</div>

{% endblock %}

{% block scripts %}
<script>
async function runPrediction() {
    const stockCode = document.getElementById('stock-code').value.trim();
    if (!stockCode) {
        alert('请输入股票代码');
        return;
    }
    
    const days = parseInt(document.getElementById('days').value);
    const useNews = document.getElementById('use-news').value === 'true';
    const useRelevance = document.getElementById('use-relevance').value === 'true';
    
    // 显示加载状态
    document.getElementById('loading-section').style.display = 'block';
    document.getElementById('result-section').style.display = 'none';
    
    try {
        const response = await fetch(`/api/predict/multimodal/${stockCode}`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                days: days,
                use_news: useNews,
                use_relevance: useRelevance
            })
        });
        
        const data = await response.json();
        
        if (data.success) {
            displayResult(data.data);
        } else {
            alert('预测失败: ' + data.message);
        }
    } catch (error) {
        console.error('预测失败:', error);
        alert('预测失败，请稍后重试');
    } finally {
        document.getElementById('loading-section').style.display = 'none';
    }
}

function displayResult(result) {
    document.getElementById('result-section').style.display = 'block';
    
    // 核心预测结果
    const prediction = result.prediction;
    const predictionText = result.prediction_text;
    const confidence = result.confidence;
    const probability = result.probability;
    
    const isUp = prediction === 1;
    const mainColor = isUp ? '#28a745' : '#dc3545';
    const bgColor = isUp ? '#d4edda' : '#f8d7da';
    const icon = isUp ? '📈' : '📉';
    
    document.getElementById('prediction-result').innerHTML = `
        <div style="display: flex; gap: 20px; margin-bottom: 20px;">
            <div style="flex: 1; text-align: center; padding: 30px; background: ${bgColor}; border-radius: 12px; border: 2px solid ${mainColor};">
                <div style="font-size: 48px; margin-bottom: 10px;">${icon}</div>
                <div style="font-size: 28px; font-weight: bold; color: ${mainColor};">${predictionText}</div>
                <div style="font-size: 14px; color: #666; margin-top: 5px;">预测方向</div>
            </div>
            <div style="flex: 1;">
                <div class="stats-grid" style="margin: 0;">
                    <div class="stat-card">
                        <div class="label">置信度</div>
                        <div class="value" style="color: ${mainColor};">${(confidence * 100).toFixed(1)}%</div>
                    </div>
                    <div class="stat-card">
                        <div class="label">上涨概率</div>
                        <div class="value">${(probability * 100).toFixed(1)}%</div>
                    </div>
                    <div class="stat-card">
                        <div class="label">预期收益</div>
                        <div class="value" style="color: ${result.expected_return >= 0 ? '#28a745' : '#dc3545'};">
                            ${result.expected_return >= 0 ? '+' : ''}${result.expected_return}%
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="label">预测价格</div>
                        <div class="value">${result.predicted_price}</div>
                    </div>
                </div>
            </div>
        </div>
        <div style="display: flex; gap: 20px; font-size: 14px; color: #666;">
            <span>📅 分析时间: ${result.analysis_time}</span>
            <span>📊 新闻数量: ${result.news_count}</span>
            <span>💰 最新价格: ${result.latest_price}</span>
        </div>
    `;
    
    // 特征融合情况
    const featuresUsed = result.features_used || {};
    document.getElementById('features-used').innerHTML = `
        <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px;">
            <div style="text-align: center; padding: 20px; background: ${featuresUsed.news ? '#d4edda' : '#f8f9fa'}; border-radius: 8px; border: 2px solid ${featuresUsed.news ? '#28a745' : '#dee2e6'};">
                <div style="font-size: 24px; margin-bottom: 5px;">${featuresUsed.news ? '✅' : '⚪'}</div>
                <div style="font-weight: 500; color: ${featuresUsed.news ? '#155724' : '#6c757d'};">新闻特征</div>
                <div style="font-size: 12px; color: #666;">情感/影响向量</div>
            </div>
            <div style="text-align: center; padding: 20px; background: ${featuresUsed.sector ? '#d4edda' : '#f8f9fa'}; border-radius: 8px; border: 2px solid ${featuresUsed.sector ? '#28a745' : '#dee2e6'};">
                <div style="font-size: 24px; margin-bottom: 5px;">${featuresUsed.sector ? '✅' : '⚪'}</div>
                <div style="font-weight: 500; color: ${featuresUsed.sector ? '#155724' : '#6c757d'};">领域特征</div>
                <div style="font-size: 12px; color: #666;">领域影响向量</div>
            </div>
            <div style="text-align: center; padding: 20px; background: ${featuresUsed.tech ? '#d4edda' : '#f8f9fa'}; border-radius: 8px; border: 2px solid ${featuresUsed.tech ? '#28a745' : '#dee2e6'};">
                <div style="font-size: 24px; margin-bottom: 5px;">${featuresUsed.tech ? '✅' : '⚪'}</div>
                <div style="font-weight: 500; color: ${featuresUsed.tech ? '#155724' : '#6c757d'};">技术特征</div>
                <div style="font-size: 12px; color: #666;">技术指标向量</div>
            </div>
            <div style="text-align: center; padding: 20px; background: ${featuresUsed.relevance ? '#d4edda' : '#f8f9fa'}; border-radius: 8px; border: 2px solid ${featuresUsed.relevance ? '#28a745' : '#dee2e6'};">
                <div style="font-size: 24px; margin-bottom: 5px;">${featuresUsed.relevance ? '✅' : '⚪'}</div>
                <div style="font-weight: 500; color: ${featuresUsed.relevance ? '#155724' : '#6c757d'};">相关性特征</div>
                <div style="font-size: 12px; color: #666;">关联矩阵向量</div>
            </div>
        </div>
    `;
    
    // 特征详情
    const featureSummary = result.feature_summary || {};
    document.getElementById('feature-details').innerHTML = `
        <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px;">
            <div style="padding: 15px; background: #f8f9fa; border-radius: 8px;">
                <h4 style="margin: 0 0 15px 0; color: #333;">📰 新闻特征</h4>
                <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;">
                    <div>
                        <div style="font-size: 12px; color: #666;">情感分数</div>
                        <div style="font-size: 18px; font-weight: 500; color: ${featureSummary.news_sentiment >= 0 ? '#28a745' : '#dc3545'};">
                            ${featureSummary.news_sentiment?.toFixed(3) || '-'}
                        </div>
                    </div>
                    <div>
                        <div style="font-size: 12px; color: #666;">加权情感</div>
                        <div style="font-size: 18px; font-weight: 500; color: ${featureSummary.news_weighted_sentiment >= 0 ? '#28a745' : '#dc3545'};">
                            ${featureSummary.news_weighted_sentiment?.toFixed(3) || '-'}
                        </div>
                    </div>
                </div>
            </div>
            <div style="padding: 15px; background: #f8f9fa; border-radius: 8px;">
                <h4 style="margin: 0 0 15px 0; color: #333;">🏭 领域影响</h4>
                <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;">
                    <div>
                        <div style="font-size: 12px; color: #666;">平均影响</div>
                        <div style="font-size: 18px; font-weight: 500; color: ${featureSummary.sector_impact >= 0 ? '#28a745' : '#dc3545'};">
                            ${featureSummary.sector_impact?.toFixed(3) || '-'}
                        </div>
                    </div>
                    <div>
                        <div style="font-size: 12px; color: #666;">影响方向</div>
                        <div style="font-size: 18px; font-weight: 500;">
                            ${featureSummary.sector_impact >= 0.1 ? '正面' : (featureSummary.sector_impact <= -0.1 ? '负面' : '中性')}
                        </div>
                    </div>
                </div>
            </div>
            <div style="padding: 15px; background: #f8f9fa; border-radius: 8px;">
                <h4 style="margin: 0 0 15px 0; color: #333;">📈 技术指标</h4>
                <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;">
                    <div>
                        <div style="font-size: 12px; color: #666;">趋势方向</div>
                        <div style="font-size: 18px; font-weight: 500; color: ${featureSummary.tech_trend === 'up' ? '#28a745' : '#dc3545'};">
                            ${featureSummary.tech_trend === 'up' ? '↑ 上涨' : '↓ 下跌'}
                        </div>
                    </div>
                    <div>
                        <div style="font-size: 12px; color: #666;">RSI指标</div>
                        <div style="font-size: 18px; font-weight: 500;">
                            ${featureSummary.rsi?.toFixed(2) || '-'}
                        </div>
                    </div>
                </div>
            </div>
            <div style="padding: 15px; background: #f8f9fa; border-radius: 8px;">
                <h4 style="margin: 0 0 15px 0; color: #333;">🔗 模型信息</h4>
                <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;">
                    <div>
                        <div style="font-size: 12px; color: #666;">模型类型</div>
                        <div style="font-size: 18px; font-weight: 500;">${result.model_type || 'multimodal'}</div>
                    </div>
                    <div>
                        <div style="font-size: 12px; color: #666;">融合维度</div>
                        <div style="font-size: 18px; font-weight: 500;">
                            ${Object.values(featuresUsed).filter(v => v).length}/4
                        </div>
                    </div>
                </div>
            </div>
        </div>
    `;
}

// 页面加载时运行默认预测
document.addEventListener('DOMContentLoaded', function() {
    runPrediction();
});
</script>
{% endblock %}
