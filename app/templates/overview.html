{% extends "base.html" %}

{% block content %}
<div class="card">
    <h2>🎯 系统总览</h2>
    <div class="stats-grid">
        <div class="stat-card">
            <div class="label">数据源状态</div>
            <div class="value">✓ 正常</div>
        </div>
        <div class="stat-card">
            <div class="label">
                可用股票
                <button
                    id="refresh-stocks-btn"
                    onclick="refreshStockList()"
                    style="margin-left: 10px; padding: 5px 12px; font-size: 12px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer;"
                    title="刷新股票列表">
                    🔄 刷新
                </button>
            </div>
            <div class="value" id="stock-count">-</div>
        </div>
        <div class="stat-card" id="market-task-card">
            <div class="label">行情更新任务</div>
            <div class="value" id="market-task-status">待执行</div>
        </div>
        <div class="stat-card" id="news-task-card">
            <div class="label">新闻同步任务</div>
            <div class="value" id="news-task-status">待执行</div>
        </div>
        <div class="stat-card">
            <div class="label">系统状态</div>
            <div class="value" id="system-status">-</div>
        </div>
    </div>
</div>

<div class="card" style="margin-top: 20px;">
    <h2>🛠️ 后台数据维护</h2>
    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 16px;">
        <div style="padding: 14px; border: 1px solid #e2e8f0; border-radius: 10px; background: #f8fafc;">
            <h3 style="margin: 0 0 10px 0; font-size: 16px;">📈 全量行情更新（截至今日）</h3>
            <p style="margin: 0 0 12px 0; color: #475569; font-size: 13px; line-height: 1.6;">
                后台遍历全部股票并强制刷新走势缓存，目标日期为今日交易日。
            </p>
            <button id="market-update-btn" onclick="startMarketUpdate()"
                style="width: 100%; padding: 10px; font-size: 14px; background: #16a34a; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-weight: 500;">
                启动全量行情更新
            </button>

            <div id="market-update-panel" style="display: none; margin-top: 12px;">
                <div style="background: #e2e8f0; border-radius: 6px; height: 12px; overflow: hidden;">
                    <div id="market-update-progress-fill" style="background: #16a34a; height: 100%; width: 0%; transition: width 0.25s;"></div>
                </div>
                <div style="display: flex; justify-content: space-between; margin-top: 8px; font-size: 13px;">
                    <span id="market-update-message" style="color: #475569;">等待任务启动...</span>
                    <strong id="market-update-percent">0%</strong>
                </div>
                <div id="market-update-detail" style="margin-top: 6px; font-size: 12px; color: #64748b;"></div>
            </div>
        </div>

        <div style="padding: 14px; border: 1px solid #e2e8f0; border-radius: 10px; background: #f8fafc;">
            <h3 style="margin: 0 0 10px 0; font-size: 16px;">📰 全源新闻同步</h3>
            <p style="margin: 0 0 12px 0; color: #475569; font-size: 13px; line-height: 1.6;">
                后台同步东方财富、新浪、腾讯三类新闻源，并统一写入全局新闻缓存。
            </p>
            <button id="news-sync-btn" onclick="startNewsSync()"
                style="width: 100%; padding: 10px; font-size: 14px; background: #2563eb; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-weight: 500;">
                启动全源新闻同步
            </button>

            <div id="news-sync-panel" style="display: none; margin-top: 12px;">
                <div style="background: #e2e8f0; border-radius: 6px; height: 12px; overflow: hidden;">
                    <div id="news-sync-progress-fill" style="background: #2563eb; height: 100%; width: 0%; transition: width 0.25s;"></div>
                </div>
                <div style="display: flex; justify-content: space-between; margin-top: 8px; font-size: 13px;">
                    <span id="news-sync-message" style="color: #475569;">等待任务启动...</span>
                    <strong id="news-sync-percent">0%</strong>
                </div>
                <div id="news-sync-detail" style="margin-top: 6px; font-size: 12px; color: #64748b;"></div>
            </div>
        </div>
    </div>
</div>

<div id="refresh-message" style="display: none; margin-top: 15px; padding: 10px; border-radius: 5px; font-size: 14px;"></div>
{% endblock %}

{% block scripts %}
<script>
let opsPollTimer = null;
let lastMarketEndTime = null;
let lastNewsEndTime = null;

// 页面加载时初始化
window.addEventListener('DOMContentLoaded', async function() {
    await loadStockData();
    await checkSystemStatus();
    await syncMarketUpdateStatus();
    await syncNewsSyncStatus();

    if (opsPollTimer) {
        clearInterval(opsPollTimer);
    }
    opsPollTimer = setInterval(async () => {
        await syncMarketUpdateStatus();
        await syncNewsSyncStatus();
    }, 3000);
});

function showBanner(message, type = 'info') {
    const messageDiv = document.getElementById('refresh-message');
    if (!messageDiv) {
        return;
    }

    messageDiv.style.display = 'block';
    messageDiv.textContent = message;

    if (type === 'success') {
        messageDiv.style.background = '#dcfce7';
        messageDiv.style.color = '#166534';
    } else if (type === 'error') {
        messageDiv.style.background = '#fee2e2';
        messageDiv.style.color = '#991b1b';
    } else {
        messageDiv.style.background = '#e2e8f0';
        messageDiv.style.color = '#334155';
    }

    setTimeout(() => {
        messageDiv.style.display = 'none';
    }, 3200);
}

async function loadStockData() {
    try {
        const response = await fetch('/api/stocks');
        const payload = await response.json();
        if (!response.ok || !payload.success) {
            throw new Error(payload.message || '加载股票列表失败');
        }

        document.getElementById('stock-count').textContent = `${payload.total || 0}`;
    } catch (error) {
        console.error('加载股票数据失败:', error);
        document.getElementById('stock-count').textContent = '✗';
    }
}

async function checkSystemStatus() {
    try {
        const response = await fetch('/api/health');
        const payload = await response.json();
        const statusEl = document.getElementById('system-status');

        if (payload.status === 'ok') {
            statusEl.textContent = '✓ 运行中';
            statusEl.style.color = '#16a34a';
        } else {
            statusEl.textContent = '✗ 异常';
            statusEl.style.color = '#dc2626';
        }
    } catch (error) {
        console.error('检查系统状态失败:', error);
        const statusEl = document.getElementById('system-status');
        statusEl.textContent = '✗ 无法连接';
        statusEl.style.color = '#dc2626';
    }
}

async function refreshStockList() {
    const btn = document.getElementById('refresh-stocks-btn');
    const oldText = btn.textContent;
    btn.disabled = true;
    btn.textContent = '刷新中...';

    try {
        const response = await fetch('/api/stocks?refresh=true');
        const payload = await response.json();
        if (!response.ok || !payload.success) {
            throw new Error(payload.message || '刷新股票列表失败');
        }

        document.getElementById('stock-count').textContent = `${payload.total || 0}`;
        showBanner('股票列表刷新成功', 'success');
    } catch (error) {
        console.error('刷新股票列表失败:', error);
        showBanner(`刷新失败：${error.message}`, 'error');
    } finally {
        btn.disabled = false;
        btn.textContent = oldText;
    }
}

async function startMarketUpdate() {
    const btn = document.getElementById('market-update-btn');
    btn.disabled = true;
    btn.textContent = '启动中...';

    try {
        const response = await fetch('/api/system/market-update', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                days: 400,
                refresh_stock_list: true
            })
        });

        const payload = await response.json();
        if (!response.ok || !payload.success) {
            throw new Error(payload.message || '启动全量行情更新失败');
        }

        document.getElementById('market-update-panel').style.display = 'block';
        showBanner('全量行情更新任务已启动', 'success');
        await syncMarketUpdateStatus();
    } catch (error) {
        console.error('启动全量行情更新失败:', error);
        btn.disabled = false;
        btn.textContent = '启动全量行情更新';
        showBanner(`启动失败：${error.message}`, 'error');
    }
}

async function startNewsSync() {
    const btn = document.getElementById('news-sync-btn');
    btn.disabled = true;
    btn.textContent = '启动中...';

    try {
        const response = await fetch('/api/system/news-sync', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                sources: ['eastmoney', 'sina', 'tencent'],
                limit_per_source: 300
            })
        });

        const payload = await response.json();
        if (!response.ok || !payload.success) {
            throw new Error(payload.message || '启动全源新闻同步失败');
        }

        document.getElementById('news-sync-panel').style.display = 'block';
        showBanner('全源新闻同步任务已启动', 'success');
        await syncNewsSyncStatus();
    } catch (error) {
        console.error('启动全源新闻同步失败:', error);
        btn.disabled = false;
        btn.textContent = '启动全源新闻同步';
        showBanner(`启动失败：${error.message}`, 'error');
    }
}

function renderTaskCardStatus(cardId, textId, status, kind = 'default') {
    const card = document.getElementById(cardId);
    const textEl = document.getElementById(textId);
    if (!card || !textEl) {
        return;
    }

    card.classList.remove('positive');
    textEl.style.color = '';

    if (status === 'running') {
        textEl.textContent = '进行中';
        textEl.style.color = '#2563eb';
    } else if (status === 'success') {
        textEl.textContent = '已完成';
        textEl.style.color = '#16a34a';
        card.classList.add('positive');
    } else if (status === 'error') {
        textEl.textContent = '失败';
        textEl.style.color = '#dc2626';
    } else {
        textEl.textContent = kind === 'news' ? '待同步' : '待执行';
        textEl.style.color = '#64748b';
    }
}

async function syncMarketUpdateStatus() {
    try {
        const response = await fetch('/api/system/market-update/status');
        const payload = await response.json();
        if (!response.ok || !payload.success) {
            return;
        }

        const status = payload.status || {};
        const btn = document.getElementById('market-update-btn');
        const panel = document.getElementById('market-update-panel');
        const progress = Number(status.progress || 0);
        const message = status.message || '等待任务启动...';
        const detail = status.detail || {};

        const hasRuntimeInfo = !!(status.start_time || status.end_time || status.is_running || status.error || progress > 0);
        if (hasRuntimeInfo) {
            panel.style.display = 'block';
        }

        document.getElementById('market-update-progress-fill').style.width = `${progress}%`;
        document.getElementById('market-update-percent').textContent = `${progress}%`;
        document.getElementById('market-update-message').textContent = message;

        if (status.error) {
            renderTaskCardStatus('market-task-card', 'market-task-status', 'error');
            btn.disabled = false;
            btn.textContent = '重新执行全量行情更新';
            document.getElementById('market-update-detail').textContent = `错误: ${status.error}`;
            return;
        }

        const current = Number(detail.current || 0);
        const total = Number(detail.total || 0);
        const successCount = Number(detail.success_count || 0);
        const failCount = Number(detail.fail_count || 0);
        const currentStock = detail.current_stock || '';
        const latestTradeDate = detail.latest_trade_date || (status.result && status.result.latest_trade_date) || '-';
        document.getElementById('market-update-detail').textContent =
            `进度: ${current}/${total} | 成功: ${successCount} | 失败: ${failCount} | 当前: ${currentStock || '-'} | 最新交易日: ${latestTradeDate}`;

        if (status.is_running) {
            renderTaskCardStatus('market-task-card', 'market-task-status', 'running');
            btn.disabled = true;
            btn.textContent = '全量行情更新中...';
            return;
        }

        btn.disabled = false;
        btn.textContent = '启动全量行情更新';
        if (progress === 100) {
            renderTaskCardStatus('market-task-card', 'market-task-status', 'success');
            if (status.end_time && status.end_time !== lastMarketEndTime) {
                lastMarketEndTime = status.end_time;
                showBanner('全量行情更新已完成', 'success');
                await loadStockData();
            }
        } else {
            renderTaskCardStatus('market-task-card', 'market-task-status', 'idle');
        }
    } catch (error) {
        console.error('同步全量行情更新状态失败:', error);
    }
}

async function syncNewsSyncStatus() {
    try {
        const response = await fetch('/api/system/news-sync/status');
        const payload = await response.json();
        if (!response.ok || !payload.success) {
            return;
        }

        const status = payload.status || {};
        const btn = document.getElementById('news-sync-btn');
        const panel = document.getElementById('news-sync-panel');
        const progress = Number(status.progress || 0);
        const message = status.message || '等待任务启动...';
        const detail = status.detail || {};

        const hasRuntimeInfo = !!(status.start_time || status.end_time || status.is_running || status.error || progress > 0);
        if (hasRuntimeInfo) {
            panel.style.display = 'block';
        }

        document.getElementById('news-sync-progress-fill').style.width = `${progress}%`;
        document.getElementById('news-sync-percent').textContent = `${progress}%`;
        document.getElementById('news-sync-message').textContent = message;

        if (status.error) {
            renderTaskCardStatus('news-task-card', 'news-task-status', 'error', 'news');
            btn.disabled = false;
            btn.textContent = '重新执行全源新闻同步';
            document.getElementById('news-sync-detail').textContent = `错误: ${status.error}`;
            return;
        }

        const sourceIndex = Number(detail.source_index || 0);
        const sourceTotal = Number(detail.source_total || 0);
        const counts = detail.source_counts || (status.result && status.result.source_counts) || {};
        const totalUnique = Number(detail.total_unique || (status.result && status.result.total_unique) || 0);
        const countText = Object.keys(counts).length
            ? Object.entries(counts).map(([k, v]) => `${k}:${v}`).join(' / ')
            : '-';
        document.getElementById('news-sync-detail').textContent =
            `来源进度: ${sourceIndex}/${sourceTotal} | 唯一新闻: ${totalUnique} | 来源条数: ${countText}`;

        if (status.is_running) {
            renderTaskCardStatus('news-task-card', 'news-task-status', 'running', 'news');
            btn.disabled = true;
            btn.textContent = '全源新闻同步中...';
            return;
        }

        btn.disabled = false;
        btn.textContent = '启动全源新闻同步';
        if (progress === 100) {
            renderTaskCardStatus('news-task-card', 'news-task-status', 'success', 'news');
            if (status.end_time && status.end_time !== lastNewsEndTime) {
                lastNewsEndTime = status.end_time;
                showBanner('全源新闻同步已完成', 'success');
            }
        } else {
            renderTaskCardStatus('news-task-card', 'news-task-status', 'idle', 'news');
        }
    } catch (error) {
        console.error('同步全源新闻任务状态失败:', error);
    }
}
</script>
{% endblock %}
