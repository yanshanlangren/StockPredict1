{% extends "base.html" %}

{% block content %}
<div class="card">
    <h2>🎯 智能股票推荐</h2>
    <p style="color: #666; margin-bottom: 20px;">
        基于AI模型分析，为您推荐短期收益率最高的股票
    </p>

    <div class="form-group" style="margin-bottom: 15px;">
        <label>返回数量：</label>
        <select id="top-n" style="width: 150px;">
            <option value="5">Top 5</option>
            <option value="10" selected>Top 10</option>
            <option value="20">Top 20</option>
        </select>
    </div>

    <div class="form-group" style="margin-bottom: 15px;">
        <label>建议持有天数：</label>
        <select id="hold-days" style="width: 150px;">
            <option value="3">3天</option>
            <option value="5" selected>5天</option>
            <option value="10">10天</option>
            <option value="15">15天</option>
        </select>
    </div>

    <div class="form-group" style="margin-bottom: 15px;">
        <label>最低价格过滤：</label>
        <input type="number" id="min-price" value="0" min="0" step="0.1" style="width: 150px;">
        <small style="color: #666; margin-left: 10px;">过滤掉低于此价格的股票</small>
    </div>

    <button class="btn btn-primary" onclick="getRecommendations()" id="recommend-btn">🔍 开始分析</button>
</div>

<div id="recommendation-result"></div>
{% endblock %}

{% block scripts %}
<script>
// 获取推荐股票
async function getRecommendations() {
    const topN = document.getElementById('top-n').value;
    const holdDays = document.getElementById('hold-days').value;
    const minPrice = document.getElementById('min-price').value;
    const btn = document.getElementById('recommend-btn');

    // 显示加载状态
    btn.disabled = true;
    btn.textContent = '分析中...';
    showLoading('recommendation-result', `
        <div style="text-align: center; padding: 40px;">
            <div style="font-size: 32px; margin-bottom: 20px;">🔄</div>
            <div style="font-size: 18px;">正在分析股票数据...</div>
            <div style="color: #666; margin-top: 10px;">
                这可能需要一些时间，请稍候...
            </div>
        </div>
    `);

    try {
        const response = await apiRequest('/api/recommend', {
            method: 'POST',
            body: JSON.stringify({
                top_n: parseInt(topN),
                hold_days: parseInt(holdDays),
                filter_min_price: parseFloat(minPrice)
            })
        });

        if (response.success) {
            const data = response.data;
            displayRecommendations(data);
        } else {
            showError('recommendation-result', response.message);
        }

    } catch (error) {
        showError('recommendation-result', error.message);
    } finally {
        btn.disabled = false;
        btn.textContent = '🔍 开始分析';
    }
}

// 显示推荐结果
function displayRecommendations(data) {
    const resultDiv = document.getElementById('recommendation-result');

    let html = `
        <div class="card" style="margin-top: 20px;">
            <h2>📊 推荐结果</h2>
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px;">
                <div class="stat-card">
                    <div class="label">分析时间</div>
                    <div class="value" style="font-size: 14px;">${data.analysis_time}</div>
                </div>
                <div class="stat-card">
                    <div class="label">分析股票数</div>
                    <div class="value">${data.total_analyzed}</div>
                </div>
                <div class="stat-card">
                    <div class="label">推荐股票数</div>
                    <div class="value">${data.recommendations.length}</div>
                </div>
                <div class="stat-card">
                    <div class="label">运行模式</div>
                    <div class="value" style="font-size: 14px;">${data.mode === 'mock' ? '模拟预测' : '深度学习'}</div>
                </div>
            </div>

            <div style="background: #f8f9fa; padding: 15px; border-radius: 5px; margin-bottom: 20px;">
                <strong>💡 投资建议：</strong>
                <ul style="margin: 10px 0 0 20px;">
                    <li>以下推荐仅供参考，不构成投资建议</li>
                    <li>请根据自身风险承受能力和投资目标进行决策</li>
                    <li>建议分散投资，不要将所有资金投入单一股票</li>
                    <li>设置止损点，控制风险</li>
                </ul>
            </div>

            <table style="width: 100%; border-collapse: collapse; margin-top: 20px;">
                <thead>
                    <tr style="background: #667eea; color: white;">
                        <th style="padding: 12px; text-align: left;">排名</th>
                        <th style="padding: 12px; text-align: left;">股票代码</th>
                        <th style="padding: 12px; text-align: left;">股票名称</th>
                        <th style="padding: 12px; text-align: right;">当前价格</th>
                        <th style="padding: 12px; text-align: right;">预测收益率</th>
                        <th style="padding: 12px; text-align: center;">建议持有天数</th>
                        <th style="padding: 12px; text-align: center;">置信度</th>
                    </tr>
                </thead>
                <tbody>
    `;

    data.recommendations.forEach((rec, index) => {
        const returnPercent = (rec.predicted_return * 100).toFixed(2);
        const confidencePercent = (rec.confidence * 100).toFixed(1);
        const returnClass = rec.predicted_return >= 0 ? 'positive' : 'negative';

        html += `
            <tr style="${index % 2 === 0 ? 'background: #f8f9fa;' : ''} border-bottom: 1px solid #dee2e6;">
                <td style="padding: 12px;">
                    ${index === 0 ? '🥇' : index === 1 ? '🥈' : index === 2 ? '🥉' : rec.rank}
                </td>
                <td style="padding: 12px; font-weight: bold;">${rec.stock_code}</td>
                <td style="padding: 12px;">${rec.stock_name}</td>
                <td style="padding: 12px; text-align: right;">¥${rec.current_price.toFixed(2)}</td>
                <td style="padding: 12px; text-align: right; color: ${rec.predicted_return >= 0 ? '#28a745' : '#dc3545'};">
                    ${rec.predicted_return >= 0 ? '+' : ''}${returnPercent}%
                </td>
                <td style="padding: 12px; text-align: center;">${rec.recommended_hold_days} 天</td>
                <td style="padding: 12px; text-align: center;">
                    <div style="background: #e9ecef; border-radius: 10px; height: 8px; width: 100px; margin: 0 auto;">
                        <div style="background: ${confidencePercent >= 70 ? '#28a745' : confidencePercent >= 50 ? '#ffc107' : '#dc3545'}; border-radius: 10px; height: 100%; width: ${confidencePercent}%;"></div>
                    </div>
                    <div style="font-size: 12px; margin-top: 5px;">${confidencePercent}%</div>
                </td>
            </tr>
        `;
    });

    html += `
                </tbody>
            </table>
        </div>
    `;

    resultDiv.innerHTML = html;
}

// 页面加载时自动获取推荐
document.addEventListener('DOMContentLoaded', function() {
    getRecommendations();
});
</script>
{% endblock %}
