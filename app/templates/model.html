{% extends "base.html" %}

{% block content %}
<div class="card">
    <h2>🎯 单股预测</h2>
    
    <!-- 模型状态提示 -->
    <div id="model-warning" style="display: none; margin-bottom: 20px; padding: 15px; background: #fff3cd; border-radius: 8px; border-left: 4px solid #ffc107;">
        <strong>⚠️ 全局模型未训练</strong>
        <p style="margin: 5px 0 0 0;">请先在首页训练全局模型后再进行预测。</p>
    </div>

    <div class="form-group">
        <label for="stock-code">股票代码：</label>
        <div style="display: flex; gap: 10px; align-items: center;">
            <input type="text" id="stock-code-input" placeholder="输入股票代码（6位数字，如600000）"
                   style="flex: 1; padding: 8px; border: 1px solid #ddd; border-radius: 4px;"
                   oninput="filterStockList()" onkeydown="if(event.key === 'Enter') predict()">
            <select id="stock-code" style="flex: 1; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
                <option value="">加载中...</option>
            </select>
        </div>
        <small style="color: #666; display: block; margin-top: 5px;">
            💡 输入股票代码或从下拉列表选择，使用全局模型预测未来5日走势
        </small>
    </div>

    <button class="btn btn-primary" onclick="predict()" id="predict-btn" 
            style="width: 100%; padding: 12px; font-size: 16px; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer;">
        🔮 预测
    </button>
</div>

<!-- 预测结果 -->
<div id="predict-result" style="display: none; margin-top: 20px;"></div>
{% endblock %}

{% block scripts %}
<script>
// 全局变量存储股票列表
let allStocks = [];

// 页面加载时
document.addEventListener('DOMContentLoaded', async function() {
    await loadStockList();
    await checkModelStatus();
});

// 检查模型状态
async function checkModelStatus() {
    try {
        const response = await fetch('/api/model/info');
        const data = await response.json();
        
        if (!data.global_model_available) {
            document.getElementById('model-warning').style.display = 'block';
            document.getElementById('predict-btn').disabled = true;
            document.getElementById('predict-btn').style.background = '#6c757d';
            document.getElementById('predict-btn').textContent = '⚠️ 请先训练模型';
        }
    } catch (error) {
        console.error('检查模型状态失败:', error);
    }
}

// 加载股票列表
async function loadStockList() {
    try {
        const response = await fetch('/api/stocks');
        const data = await response.json();

        if (data.success) {
            allStocks = data.data;
            updateStockSelect(allStocks);
            console.log(`已加载 ${data.total} 只股票`);
        } else {
            console.error('加载股票列表失败:', data.message);
            document.getElementById('stock-code').innerHTML = '<option value="">加载失败</option>';
        }
    } catch (error) {
        console.error('加载股票列表失败:', error);
        document.getElementById('stock-code').innerHTML = '<option value="">加载失败</option>';
    }
}

// 更新股票选择框
function updateStockSelect(stocks) {
    const select = document.getElementById('stock-code');
    select.innerHTML = '<option value="">选择股票...</option>';

    stocks.slice(0, 500).forEach(stock => {
        const option = document.createElement('option');
        option.value = String(stock.code);
        option.textContent = `${String(stock.code)} - ${stock.name}`;
        select.appendChild(option);
    });
}

// 过滤股票列表
function filterStockList() {
    const filterText = document.getElementById('stock-code-input').value.toLowerCase().trim();

    if (!filterText) {
        updateStockSelect(allStocks);
        return;
    }

    const filteredStocks = allStocks.filter(stock => {
        return stock.code.includes(filterText) ||
               stock.name.toLowerCase().includes(filterText);
    });

    updateStockSelect(filteredStocks);

    if (filteredStocks.length > 0) {
        document.getElementById('stock-code').value = filteredStocks[0].code;
    }
}

// 同步输入框和选择框
document.getElementById('stock-code').addEventListener('change', function() {
    const selectedCode = this.value;
    if (selectedCode) {
        document.getElementById('stock-code-input').value = selectedCode;
    }
});

// 预测
async function predict() {
    const stockCodeInput = document.getElementById('stock-code-input').value.trim();
    const stockCodeSelect = document.getElementById('stock-code').value;
    const stockCode = stockCodeInput || stockCodeSelect;

    if (!stockCode) {
        alert('请选择或输入股票代码');
        return;
    }

    // 验证股票代码格式
    if (!/^\d{6}$/.test(stockCode)) {
        alert('股票代码格式不正确，请输入6位数字（如：600000）');
        return;
    }

    const btn = document.getElementById('predict-btn');
    const resultDiv = document.getElementById('predict-result');

    // 显示加载状态
    btn.disabled = true;
    btn.textContent = '⏳ 预测中...';
    resultDiv.style.display = 'block';
    resultDiv.innerHTML = `
        <div class="card">
            <div style="text-align: center; padding: 30px;">
                <div style="font-size: 40px; margin-bottom: 15px;">🔄</div>
                <div style="font-size: 18px;">正在使用全局模型预测...</div>
            </div>
        </div>
    `;

    try {
        const response = await fetch(`/api/predict/${stockCode}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ days: 100 })
        });

        const data = await response.json();

        if (data.success) {
            displayResult(data);
        } else {
            throw new Error(data.message);
        }
    } catch (error) {
        resultDiv.innerHTML = `
            <div class="card">
                <div style="text-align: center; padding: 30px; color: #dc3545;">
                    <div style="font-size: 40px; margin-bottom: 15px;">❌</div>
                    <div style="font-size: 18px;">预测失败</div>
                    <div style="color: #666; margin-top: 10px;">${error.message}</div>
                </div>
            </div>
        `;
    } finally {
        btn.disabled = false;
        btn.textContent = '🔮 预测';
    }
}

// 显示结果
function displayResult(data) {
    const result = data.data;
    const isUp = result.prediction === 1;
    
    document.getElementById('predict-result').innerHTML = `
        <div class="card">
            <h2>📊 预测结果</h2>
            
            <!-- 主要预测信息 -->
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
                <div style="padding: 20px; background: ${isUp ? '#d4edda' : '#f8d7da'}; border-radius: 8px; text-align: center;">
                    <div style="font-size: 14px; color: #666; margin-bottom: 5px;">预测方向</div>
                    <div style="font-size: 32px; font-weight: 600; color: ${isUp ? '#155724' : '#721c24'};">
                        ${isUp ? '📈 上涨' : '📉 下跌'}
                    </div>
                </div>
                <div style="padding: 20px; background: #f8f9fa; border-radius: 8px; text-align: center;">
                    <div style="font-size: 14px; color: #666; margin-bottom: 5px;">预期收益</div>
                    <div style="font-size: 32px; font-weight: 600; color: ${result.expected_return >= 0 ? '#28a745' : '#dc3545'};">
                        ${result.expected_return >= 0 ? '+' : ''}${result.expected_return.toFixed(2)}%
                    </div>
                </div>
            </div>
            
            <!-- 详细信息 -->
            <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px;">
                <div style="text-align: center; padding: 15px; background: #f8f9fa; border-radius: 8px;">
                    <div style="font-size: 12px; color: #888;">股票代码</div>
                    <div style="font-size: 18px; font-weight: 600;">${result.stock_code}</div>
                </div>
                <div style="text-align: center; padding: 15px; background: #f8f9fa; border-radius: 8px;">
                    <div style="font-size: 12px; color: #888;">当前价格</div>
                    <div style="font-size: 18px; font-weight: 600;">¥${result.latest_price.toFixed(2)}</div>
                </div>
                <div style="text-align: center; padding: 15px; background: #f8f9fa; border-radius: 8px;">
                    <div style="font-size: 12px; color: #888;">预测价格</div>
                    <div style="font-size: 18px; font-weight: 600;">¥${result.predicted_price.toFixed(2)}</div>
                </div>
                <div style="text-align: center; padding: 15px; background: #f8f9fa; border-radius: 8px;">
                    <div style="font-size: 12px; color: #888;">置信度</div>
                    <div style="font-size: 18px; font-weight: 600;">${(result.confidence * 100).toFixed(0)}%</div>
                </div>
            </div>
            
            <!-- 预测概率 -->
            <div style="margin-bottom: 20px;">
                <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
                    <span>上涨概率</span>
                    <span>${(result.probability * 100).toFixed(1)}%</span>
                </div>
                <div style="background: #e9ecef; border-radius: 4px; height: 8px; overflow: hidden;">
                    <div style="background: #28a745; height: 100%; width: ${result.probability * 100}%;"></div>
                </div>
            </div>
            
            <!-- 模型信息 -->
            <div style="padding: 15px; background: #e7f3ff; border-radius: 8px; border-left: 4px solid #007bff;">
                <strong>📋 模型信息</strong>
                <div style="margin-top: 10px; font-size: 14px; color: #333;">
                    <p style="margin: 5px 0;">• 预测天数：${result.predict_days} 个交易日</p>
                    <p style="margin: 5px 0;">• 使用数据：${result.days_used} 天</p>
                    <p style="margin: 5px 0;">• 训练样本：${result.training_samples} 个</p>
                    <p style="margin: 5px 0;">• 模型类型：全局模型</p>
                </div>
            </div>
            
            <!-- 风险提示 -->
            <div style="margin-top: 20px; padding: 15px; background: #fff3cd; border-radius: 8px; border-left: 4px solid #ffc107;">
                <strong>⚠️ 风险提示</strong>
                <p style="margin: 5px 0 0 0; font-size: 14px; color: #333;">
                    预测结果仅供参考，不构成投资建议。股市有风险，投资需谨慎。
                </p>
            </div>
        </div>
    `;
}
</script>
{% endblock %}
