{% extends "base.html" %}

{% block content %}
<div class="card">
    <h2>🤖 模型预测</h2>

    <div class="form-group">
        <label for="stock-code">股票代码：</label>
        <select id="stock-code">
            <option value="">加载中...</option>
        </select>
    </div>

    <div class="form-group">
        <label for="days">训练天数：</label>
        <input type="number" id="days" value="30" min="20" max="100">
    </div>

    <button class="btn btn-primary" onclick="trainAndPredict()" id="predict-btn">训练并预测</button>
</div>

<div id="model-result"></div>

<div id="prediction-chart" class="card" style="display: none;">
    <h2>📈 预测结果对比</h2>
    <div class="chart-container">
        <canvas id="predictionChart"></canvas>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
// 加载股票列表
async function loadStockList() {
    try {
        const response = await fetch('/api/stocks');
        const data = await response.json();

        if (data.success) {
            const select = document.getElementById('stock-code');
            select.innerHTML = '<option value="">选择股票...</option>';

            // 添加股票选项
            data.data.forEach(stock => {
                const option = document.createElement('option');
                option.value = stock.code;
                option.textContent = `${stock.code} - ${stock.name}`;
                select.appendChild(option);
            });

            console.log(`已加载 ${data.total} 只股票`);
        } else {
            console.error('加载股票列表失败:', data.message);
            document.getElementById('stock-code').innerHTML = '<option value="">加载失败</option>';
        }
    } catch (error) {
        console.error('加载股票列表失败:', error);
        document.getElementById('stock-code').innerHTML = '<option value="">加载失败</option>';
    }
}

// 页面加载时
document.addEventListener('DOMContentLoaded', function() {
    // 加载股票列表
    loadStockList();
});

// 训练并预测
async function trainAndPredict() {
    const stockCode = document.getElementById('stock-code').value;
    const days = document.getElementById('days').value;
    const btn = document.getElementById('predict-btn');

    if (!stockCode) {
        alert('请选择股票代码');
        return;
    }

    // 显示加载状态
    btn.disabled = true;
    btn.textContent = '训练中...';
    showLoading('model-result');
    document.getElementById('prediction-chart').style.display = 'none';

    try {
        // 调用预测API
        const response = await apiRequest(`/api/predict/${stockCode}`, {
            method: 'POST',
            body: JSON.stringify({ days: parseInt(days) })
        });

        if (response.success) {
            const data = response.data;

            // 显示结果
            const resultHtml = `
                <div class="card">
                    <h2>📊 模型训练结果</h2>
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="label">股票代码</div>
                            <div class="value" style="font-size: 22px;">${data.stock_code}</div>
                        </div>
                        <div class="stat-card">
                            <div class="label">训练样本</div>
                            <div class="value">${data.train_days}</div>
                        </div>
                        <div class="stat-card">
                            <div class="label">测试样本</div>
                            <div class="value">${data.test_days}</div>
                        </div>
                        <div class="stat-card ${data.accuracy >= 0.5 ? 'positive' : 'negative'}">
                            <div class="label">预测准确率</div>
                            <div class="value">${(data.accuracy * 100).toFixed(1)}%</div>
                        </div>
                        <div class="stat-card">
                            <div class="label">特征数量</div>
                            <div class="value">${data.features_used}</div>
                        </div>
                        <div class="stat-card">
                            <div class="label">模型类型</div>
                            <div class="value" style="font-size: 16px;">多指标集成</div>
                        </div>
                    </div>
                </div>
            `;

            document.getElementById('model-result').innerHTML = resultHtml;

            // 显示图表
            document.getElementById('prediction-chart').style.display = 'block';
            createPredictionChart('predictionChart', data.dates, data.actual, data.predicted);

        } else {
            showError('model-result', response.message);
        }

    } catch (error) {
        showError('model-result', error.message);
    } finally {
        btn.disabled = false;
        btn.textContent = '训练并预测';
    }
}
</script>
{% endblock %}
