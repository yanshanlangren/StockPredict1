{% extends "base.html" %}

{% block content %}
<div class="card">
    <h2>🤖 模型预测</h2>

    <div class="form-group">
        <label for="stock-code">股票代码：</label>
        <select id="stock-code">
            <option value="">加载中...</option>
        </select>
    </div>

    <div class="form-group">
        <label for="days">训练天数：</label>
        <input type="number" id="days" value="60" min="50" max="300" placeholder="建议60-180天">
        <small style="color: #666; display: block; margin-top: 5px;">
            💡 建议使用60-180天数据以获得更好的预测效果
        </small>
    </div>

    <button class="btn btn-primary" onclick="trainAndPredict()" id="predict-btn">训练并预测</button>
</div>

<div id="model-result"></div>

<div id="prediction-chart" class="card" style="display: none;">
    <h2>📈 预测结果对比</h2>
    <div class="chart-container">
        <canvas id="predictionChart"></canvas>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
// 加载股票列表
async function loadStockList() {
    try {
        const response = await fetch('/api/stocks');
        const data = await response.json();

        if (data.success) {
            const select = document.getElementById('stock-code');
            select.innerHTML = '<option value="">选择股票...</option>';

            // 添加股票选项
            data.data.forEach(stock => {
                const option = document.createElement('option');
                option.value = stock.code;
                option.textContent = `${stock.code} - ${stock.name}`;
                select.appendChild(option);
            });

            console.log(`已加载 ${data.total} 只股票`);
        } else {
            console.error('加载股票列表失败:', data.message);
            document.getElementById('stock-code').innerHTML = '<option value="">加载失败</option>';
        }
    } catch (error) {
        console.error('加载股票列表失败:', error);
        document.getElementById('stock-code').innerHTML = '<option value="">加载失败</option>';
    }
}

// 页面加载时
document.addEventListener('DOMContentLoaded', function() {
    // 加载股票列表
    loadStockList();
});

// 训练并预测
async function trainAndPredict() {
    const stockCode = document.getElementById('stock-code').value;
    const days = document.getElementById('days').value;
    const btn = document.getElementById('predict-btn');

    if (!stockCode) {
        alert('请选择股票代码');
        return;
    }

    // 显示加载状态
    btn.disabled = true;
    btn.textContent = '加载中...';
    showLoading('model-result', `
        <div style="text-align: center; padding: 20px;">
            <div style="font-size: 24px; margin-bottom: 15px;">🔄</div>
            <div>正在加载数据...</div>
            <div style="color: #666; margin-top: 10px; font-size: 14px;">
                如果数据不足，系统会自动从腾讯财经重新获取
            </div>
        </div>
    `);
    document.getElementById('prediction-chart').style.display = 'none';

    try {
        // 调用预测API
        const response = await apiRequest(`/api/predict/${stockCode}`, {
            method: 'POST',
            body: JSON.stringify({ days: parseInt(days) })
        });

        if (response.success) {
            const data = response.data;

            // 检查是否是模拟预测模式
            const isMockMode = response.mode === 'mock';

            // 显示结果
            let resultHtml = '';

            if (isMockMode) {
                // 模拟预测模式
                resultHtml = `
                    <div class="card">
                        <h2>📊 模型预测结果（模拟模式）</h2>
                        <div style="background: #fff3cd; padding: 15px; border-radius: 5px; margin-bottom: 20px; border-left: 4px solid #ffc107;">
                            <strong>⚠️ 当前运行在轻量模式</strong><br>
                            TensorFlow未安装，使用模拟预测。如需真实预测，请安装完整版：<br>
                            <code>pip install -r requirements_full.txt</code>
                        </div>
                        <div class="stats-grid">
                            <div class="stat-card">
                                <div class="label">股票代码</div>
                                <div class="value" style="font-size: 22px;">${stockCode}</div>
                            </div>
                            <div class="stat-card">
                                <div class="label">数据天数</div>
                                <div class="value">${data.days_used}</div>
                            </div>
                            <div class="stat-card ${data.accuracy >= 50 ? 'positive' : 'negative'}">
                                <div class="label">模拟准确率</div>
                                <div class="value">${data.accuracy.toFixed(1)}%</div>
                            </div>
                            <div class="stat-card">
                                <div class="label">最新价格</div>
                                <div class="value">¥${data.latest_price.toFixed(2)}</div>
                            </div>
                        </div>

                        <div class="card" style="margin-top: 20px;">
                            <h3>🔮 未来5天预测</h3>
                            <div style="display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 15px;">
                                ${data.predictions.map((pred, i) => `
                                    <div style="text-align: center; padding: 10px; background: #f8f9fa; border-radius: 5px;">
                                        <div style="font-size: 12px; color: #666;">第${i+1}天</div>
                                        <div style="font-size: 18px; font-weight: bold; margin-top: 5px;">¥${pred.toFixed(2)}</div>
                                        <div style="font-size: 12px; color: ${pred > data.latest_price ? '#28a745' : '#dc3545'};">
                                            ${pred > data.latest_price ? '↗' : '↘'} ${((pred - data.latest_price) / data.latest_price * 100).toFixed(1)}%
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                `;
            } else {
                // 完整预测模式
                resultHtml = `
                    <div class="card">
                        <h2>📊 模型训练结果</h2>
                        <div class="stats-grid">
                            <div class="stat-card">
                                <div class="label">股票代码</div>
                                <div class="value" style="font-size: 22px;">${data.stock_code}</div>
                            </div>
                            <div class="stat-card">
                                <div class="label">训练样本</div>
                                <div class="value">${data.train_days}</div>
                            </div>
                            <div class="stat-card">
                                <div class="label">测试样本</div>
                                <div class="value">${data.test_days}</div>
                            </div>
                            <div class="stat-card ${data.accuracy >= 0.5 ? 'positive' : 'negative'}">
                                <div class="label">预测准确率</div>
                                <div class="value">${(data.accuracy * 100).toFixed(1)}%</div>
                            </div>
                            <div class="stat-card ${data.total_return >= 0 ? 'positive' : 'negative'}">
                                <div class="label">模拟收益率</div>
                                <div class="value">${formatPercent(data.total_return)}</div>
                            </div>
                            <div class="stat-card">
                                <div class="label">特征数量</div>
                                <div class="value">${data.features_used}</div>
                            </div>
                            <div class="stat-card">
                                <div class="label">模型类型</div>
                                <div class="value" style="font-size: 16px;">收益优化</div>
                            </div>
                        </div>
                    </div>
                `;
            }

            document.getElementById('model-result').innerHTML = resultHtml;

            // 显示图表
            document.getElementById('prediction-chart').style.display = 'block';

            if (isMockMode) {
                // 模拟预测图表
                createMockPredictionChart('predictionChart', data.chart_data);
            } else {
                // 完整预测图表
                createPredictionChart('predictionChart', data.dates, data.actual, data.predicted);
            }

        } else {
            // 更友好的错误提示
            let errorMessage = response.message;
            
            if (errorMessage.includes('数据不足') || errorMessage.includes('数据严重不足')) {
                errorMessage = `
                    <div style="text-align: left;">
                        <strong>❌ ${errorMessage}</strong><br><br>
                        💡 <strong>建议解决方案：</strong><br>
                        1. 增加训练天数（建议60-180天）<br>
                        2. 选择上市时间较长的股票<br>
                        3. 等待几分钟后重试（系统会自动重新获取数据）<br><br>
                        <button class="btn btn-primary" onclick="trainAndPredict()" style="margin-top: 10px;">
                            🔄 重新尝试
                        </button>
                    </div>
                `;
            }
            
            showError('model-result', errorMessage);
        }

    } catch (error) {
        showError('model-result', error.message);
    } finally {
        btn.disabled = false;
        btn.textContent = '训练并预测';
    }
}

// 创建模拟预测图表
function createMockPredictionChart(canvasId, chartData) {
    const ctx = document.getElementById(canvasId).getContext('2d');

    // 准备数据
    const dates = [];
    const actual = [];
    const predicted = [];

    chartData.forEach(item => {
        dates.push(item.date);
        actual.push(item.actual);
        predicted.push(item.predicted);
    });

    new Chart(ctx, {
        type: 'line',
        data: {
            labels: dates,
            datasets: [
                {
                    label: '实际价格',
                    data: actual,
                    borderColor: 'rgb(75, 192, 192)',
                    backgroundColor: 'rgba(75, 192, 192, 0.2)',
                    tension: 0.1,
                    fill: true
                },
                {
                    label: '预测价格',
                    data: predicted,
                    borderColor: 'rgb(255, 99, 132)',
                    backgroundColor: 'rgba(255, 99, 132, 0.2)',
                    tension: 0.1,
                    fill: true,
                    borderDash: [5, 5]
                }
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: {
                    position: 'top',
                },
                title: {
                    display: true,
                    text: '股票价格预测（模拟模式）'
                }
            },
            scales: {
                y: {
                    beginAtZero: false,
                    title: {
                        display: true,
                        text: '价格 (¥)'
                    }
                },
                x: {
                    title: {
                        display: true,
                        text: '日期'
                    }
                }
            }
        }
    });
}
</script>
{% endblock %}
